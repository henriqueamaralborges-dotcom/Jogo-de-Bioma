<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomas em Guerra: Trilha Extrema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-color: #26de81;
            --invader-color: #eb4d4b;
            --bg-color: #130f40;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg-color); font-family: 'Outfit', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { height: 70px; background: #000; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; border-bottom: 3px solid #333; }
        .logo { font-family: 'Fredoka One'; font-size: 1.8rem; color: #fff; }
        
        #game-area { display: flex; flex: 1; }
        #board-box { flex: 1; position: relative; background: radial-gradient(circle, #1e272e 0%, #000 100%); }
        #svg-board { width: 100%; height: 100%; }

        #ui-bar { width: 350px; background: #2f3542; border-left: 3px solid #000; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .dice-panel { background: #000; border-radius: 20px; padding: 30px; border: 2px solid #555; text-align: center; }
        #dice-face { font-size: 5rem; font-family: 'Fredoka One'; color: #f1c40f; margin: 10px 0; }
        .btn { width: 100%; padding: 20px; border-radius: 12px; border: none; font-family: 'Fredoka One'; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .btn-roll { background: #fff; color: #000; box-shadow: 0 6px 0 #999; }
        .btn-roll:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #999; }
        .btn-roll:active { transform: translateY(3px); box-shadow: 0 3px 0 #999; }
        .btn:disabled { opacity: 0.3; transform: none !important; box-shadow: none !important; cursor: not-allowed; }

        .hint-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px dashed #555; text-align: center; font-weight: 900; color: #f1c40f; }

        #log { flex: 1; background: #000; border-radius: 10px; padding: 15px; overflow-y: auto; color: #aaa; font-size: 0.85rem; }

        /* Board Elements */
        .slot { cursor: pointer; }
        .slot:hover circle { fill: #444; }
        .active-dest { stroke: #fff; stroke-width: 5; stroke-dasharray: 6 4; animation: spin 20s linear infinite; }
        @keyframes spin { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }

        .pawn { cursor: pointer; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); transition: transform 0.3s; }
        .pawn:hover { transform: translateY(-5px) scale(1.1); }
        .pawn-selected { filter: drop-shadow(0 0 20px #fff); transform: translateY(-10px) scale(1.3); }
        .pawn-glow { animation: pulse-glow 1s infinite alternate; }
        @keyframes pulse-glow { from { opacity: 0.5; } to { opacity: 1; } }

        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <header>
        <div class="logo">BIOMAS EM GUERRA</div>
        <div id="turn-txt" style="color:var(--invader-color); font-weight: 900;">TURNO: INVASORES</div>
    </header>

    <div id="game-area">
        <div id="board-box">
            <svg id="svg-board" viewBox="0 0 1000 1000">
                <g id="links-group" opacity="0.15"></g>
                <g id="slots-group"></g>
                <g id="pawns-group"></g>
            </svg>
        </div>

        <div id="ui-bar">
            <div class="dice-panel">
                <div id="dice-face">🎲</div>
                <button class="btn btn-roll" id="roll-btn">ROLAR DADO</button>
            </div>
            
            <div id="hint" class="hint-box">ROLE O DADO PARA COMECAR</div>
            
            <div id="log"></div>
        </div>
    </div>

    <div id="modal">
        <div style="background:#000; padding: 50px; border-radius: 30px; text-align: center; border: 2px solid #555;">
            <h1 id="win-txt" style="font-size: 3rem; margin-bottom: 20px;">VITORIA!</h1>
            <button class="btn btn-roll" onclick="location.reload()">JOGAR DENOVO</button>
        </div>
    </div>

    <script>
        const BIOMES = [
            { id: 'AM', n: 'Amazônia', c: '#26de81', a: -90 },
            { id: 'CE', n: 'Cerrado', c: '#f39c12', a: -30 },
            { id: 'CA', n: 'Caatinga', c: '#e67e22', a: 30 },
            { id: 'MA', n: 'Mata Atlântica', c: '#2ecc71', a: 90 },
            { id: 'CO', n: 'Costão', c: '#3498db', a: 150 },
            { id: 'PA', n: 'Pantanal', c: '#1e90ff', a: 210 }
        ];

        class Core {
            constructor() {
                this.turn = 'INVADER'; // Invasores começam para incentivar ação
                this.dice = 0;
                this.phase = 'ROLL'; // ROLL, PIECE, GO
                this.slots = {};
                this.pawns = [];
                this.selected = null;
                this.dests = [];

                this.buildMap();
                this.spawn();
                this.bind();
                this.updateUI();
            }

            buildMap() {
                this.slots['CENTER'] = { id: 'CENTER', x: 500, y: 500, type: 'HOME', links: [] };
                BIOMES.forEach(b => {
                    let last = 'CENTER';
                    for (let i = 1; i <= 4; i++) {
                        const id = `r-${b.id}-${i}`;
                        const d = (420 / 5) * i;
                        const x = 500 + d * Math.cos(b.a * Math.PI / 180);
                        const y = 500 + d * Math.sin(b.a * Math.PI / 180);
                        this.slots[id] = { id, x, y, type: 'STEP', links: [last] };
                        this.slots[last].links.push(id);
                        last = id;
                    }
                    const bId = b.id;
                    const bx = 500 + 420 * Math.cos(b.a * Math.PI / 180);
                    const by = 500 + 420 * Math.sin(b.a * Math.PI / 180);
                    this.slots[bId] = { id: bId, x: bx, y: by, type: 'BIOME', name: b.n, color: b.c, links: [last] };
                    this.slots[last].links.push(bId);
                });

                BIOMES.forEach((b, i) => {
                    const next = BIOMES[(i + 1) % 6];
                    let last = b.id;
                    for (let j = 1; j <= 6; j++) {
                        const id = `c-${b.id}-${next.id}-${j}`;
                        const a = (b.a + ( (i === 5 ? (b.a + 60) : next.a) - b.a) * (j / 7)) * Math.PI / 180;
                        const x = 500 + 420 * Math.cos(a);
                        const y = 500 + 420 * Math.sin(a);
                        this.slots[id] = { id, x, y, type: 'STEP', links: [last] };
                        this.slots[last].links.push(id);
                        last = id;
                    }
                    this.slots[last].links.push(next.id);
                    this.slots[next.id].links.push(last);
                });

                this.drawBoard();
            }

            spawn() {
                this.pawns.push({ id: 'i1', side: 'INVADER', slot: 'CENTER', color: '#ff4d4d', icon: '💀' });
                this.pawns.push({ id: 'i2', side: 'INVADER', slot: 'CENTER', color: '#ff4d4d', icon: '💀' });
                this.pawns.push({ id: 'i3', side: 'INVADER', slot: 'CENTER', color: '#ff4d4d', icon: '💀' });
                BIOMES.forEach(b => {
                    this.pawns.push({ id: `p-${b.id}`, side: 'FOREST', slot: b.id, color: b.c, icon: '🌲' });
                });
                this.drawPawns();
            }

            drawBoard() {
                const sL = document.getElementById('slots-group');
                const lL = document.getElementById('links-group');
                Object.values(this.slots).forEach(s => {
                    s.links.forEach(lid => {
                        const l = this.slots[lid];
                        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        line.setAttribute('x1', s.x); line.setAttribute('y1', s.y);
                        line.setAttribute('x2', l.x); line.setAttribute('y2', l.y);
                        line.setAttribute('stroke', '#fff'); line.setAttribute('stroke-width', '2');
                        lL.appendChild(line);
                    });

                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.setAttribute('class', 'slot');
                    g.onclick = () => this.clickSlot(s.id);

                    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    c.setAttribute('cx', s.x); c.setAttribute('cy', s.y);
                    c.setAttribute('r', s.type === 'HOME' ? 40 : (s.type === 'BIOME' ? 30 : 15));
                    c.setAttribute('fill', s.type === 'HOME' ? '#000' : '#222');
                    c.setAttribute('stroke', s.color || '#444');
                    c.setAttribute('stroke-width', '4');
                    c.id = `circ-${s.id}`;
                    g.appendChild(c);
                    sL.appendChild(g);
                });
            }

            drawPawns() {
                const pL = document.getElementById('pawns-group'); pL.innerHTML = '';
                const groups = {};
                this.pawns.forEach(p => { groups[p.slot] = groups[p.slot] || []; groups[p.slot].push(p); });

                Object.entries(groups).forEach(([sid, ps]) => {
                    const s = this.slots[sid];
                    ps.forEach((p, i) => {
                        const off = (i - (ps.length-1)/2) * 25;
                        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        g.setAttribute('class', `pawn ${this.selected === p ? 'pawn-selected' : ''}`);
                        g.setAttribute('transform', `translate(${s.x + off}, ${s.y})`);
                        g.onclick = (e) => { e.stopPropagation(); this.clickPawn(p); };

                        const base = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        base.setAttribute('d', 'M-12,12 L12,12 L8,-8 C8,-15 0,-25 0,-25 C0,-25 -8,-15 -8,-8 Z');
                        base.setAttribute('fill', p.color); base.setAttribute('stroke', '#fff');
                        g.appendChild(base);

                        const icon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        icon.setAttribute('y', -15); icon.setAttribute('text-anchor', 'middle');
                        icon.setAttribute('fill', '#fff'); icon.setAttribute('font-size', '14');
                        icon.textContent = p.icon; icon.style.pointerEvents = 'none';
                        g.appendChild(icon);
                        pL.appendChild(g);
                    });
                });
            }

            bind() {
                document.getElementById('roll-btn').onclick = () => this.roll();
            }

            async roll() {
                if (this.phase !== 'ROLL') return;
                const d = document.getElementById('dice-face');
                const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
                for(let i=0; i<8; i++){
                    d.innerText = faces[Math.floor(Math.random()*6)];
                    await new Promise(r => setTimeout(r, 60));
                }
                this.dice = Math.floor(Math.random() * 6) + 1;
                d.innerText = faces[this.dice - 1];
                this.phase = 'PIECE';
                this.updateUI();
                this.log(`Tirou ${this.dice}! Escolha sua peça.`, this.turn.toLowerCase());
            }

            clickPawn(p) {
                if (this.phase !== 'PIECE' || p.side !== this.turn) return;
                this.selected = p;
                this.calcMoves(p.slot, this.dice);
                if (this.dests.length === 0) {
                    this.log("Sem jogadas! Passando turno.", 'system');
                    this.selected = null;
                    this.endTurn();
                    return;
                }
                this.phase = 'GO';
                this.drawPawns();
                this.drawHighs();
                this.updateUI();
            }

            calcMoves(curr, steps) {
                this.dests = [];
                let q = [{ id: curr, d: 0, path: [curr] }];
                let found = new Set();
                while(q.length > 0) {
                    let { id, d, path } = q.shift();
                    if (d === steps) {
                        found.add(id);
                        continue;
                    }
                    this.slots[id].links.forEach(next => {
                        // Impedir volte imediato no mesmo movimento (opcional)
                        if (path.length < 2 || next !== path[path.length - 2]) {
                            q.push({ id: next, d: d+1, path: [...path, next] });
                        }
                    });
                }
                this.dests = Array.from(found);
            }

            drawHighs() {
                document.querySelectorAll('.active-dest').forEach(e => e.classList.remove('active-dest'));
                this.dests.forEach(id => {
                    document.getElementById(`circ-${id}`).classList.add('active-dest');
                });
            }

            clickSlot(id) {
                if (this.phase !== 'GO' || !this.dests.includes(id)) return;
                const p = this.selected;
                p.slot = id;
                
                const rival = this.pawns.find(x => x.slot === id && x.side !== p.side);
                if (rival) {
                    this.log(`${p.side} capturou ${rival.side}!`, 'system');
                    this.pawns = this.pawns.filter(x => x !== rival);
                }
                this.endTurn();
            }

            endTurn() {
                this.turn = (this.turn === 'INVADER' ? 'FOREST' : 'INVADER');
                this.phase = 'ROLL';
                this.selected = null;
                this.dests = [];
                document.querySelectorAll('.active-dest').forEach(e => e.classList.remove('active-dest'));
                this.drawPawns();
                this.updateUI();
                this.check();
            }

            updateUI() {
                const btn = document.getElementById('roll-btn');
                btn.disabled = this.phase !== 'ROLL';
                const txt = document.getElementById('turn-txt');
                txt.innerText = this.turn === 'INVADER' ? 'TURNO: INVASORES' : 'TURNO: NATUREZA';
                txt.style.color = this.turn === 'INVADER' ? 'var(--invader-color)' : 'var(--forest-color)';
                
                const hint = document.getElementById('hint');
                if (this.phase === 'ROLL') hint.innerText = "ROLE O DADO";
                else if (this.phase === 'PIECE') hint.innerText = "CLIQUE NO SEU PIÃO";
                else hint.innerText = "CLIQUE NA CASA BRANCA";
            }

            log(m, c) {
                const l = document.getElementById('log');
                const d = document.createElement('div');
                d.style.marginBottom = '5px';
                d.style.color = c === 'invader' ? '#ff7675' : (c === 'forest' ? '#55efc4' : '#fab1a0');
                d.innerText = `> ${m}`;
                l.prepend(d);
            }

            check() {
                const f = this.pawns.filter(x => x.side === 'FOREST').length;
                const i = this.pawns.filter(x => x.side === 'INVADER').length;
                if (i === 0) this.win("NATUREZA VENCEU!");
                if (f === 0) this.win("INVASORES VENCERAM!");
            }

            win(t) {
                document.getElementById('win-txt').innerText = t;
                document.getElementById('modal').style.display = 'flex';
            }
        }
        window.onload = () => new Core();
    </script>
</body>
</html>
