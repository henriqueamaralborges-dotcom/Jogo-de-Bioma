<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomas em Guerra: Trilha Extrema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-color: #00ff7f;
            --invader-color: #ff4757;
            --bg-color: #1a1a2e;
            --slot-color: #3d3d5c;
            --highlight: #ffee00;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            background: var(--bg-color); 
            font-family: 'Outfit', sans-serif; 
            height: 100vh; 
            display: grid; 
            grid-template-columns: 1fr 350px;
            overflow: hidden;
            color: #fff;
        }

        #board-container {
            position: relative;
            background: radial-gradient(circle, #222244 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #svg-board { width: 95%; height: 95%; touch-action: none; }

        #sidebar {
            background: #161625;
            border-left: 2px solid #000;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .header-logo { font-family: 'Fredoka One'; font-size: 2rem; color: #fff; text-align: center; }
        
        .dice-panel { background: #000; border-radius: 20px; padding: 30px; border: 2px solid #444; text-align: center; }
        #dice-face { font-size: 5rem; margin-bottom: 15px; }
        
        .btn { 
            width: 100%; padding: 20px; border-radius: 12px; border: none; 
            font-family: 'Fredoka One'; font-size: 1.2rem; cursor: pointer; transition: 0.2s;
            background: #fff; color: #000; box-shadow: 0 6px 0 #999;
        }
        .btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 9px 0 #999; }
        .btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 3px 0 #999; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .hint-text { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border: 2px solid var(--highlight); color: var(--highlight); font-weight: 900; text-align: center; }

        #log-area { flex:1; background: #000; border-radius: 10px; padding: 15px; overflow-y: auto; font-size: 0.85rem; color: #aaa; }

        /* Board classes */
        .slot { cursor: pointer; pointer-events: all; }
        .slot circle { transition: 0.3s; fill: var(--slot-color); stroke: #555; stroke-width: 2; }
        .slot:hover circle { fill: #555; r: 25; }
        
        .link-line { stroke: #333; stroke-width: 4; stroke-linecap: round; pointer-events: none; }
        
        /* Highlight for valid destinations */
        .dest-highlight { 
            stroke: #fff !important; 
            stroke-width: 8 !important; 
            stroke-dasharray: 10 5; 
            animation: dash-rotate 2s linear infinite; 
            fill: rgba(255,255,255,0.4) !important;
            r: 40 !important;
        }
        @keyframes dash-rotate { from { stroke-dashoffset: 30; } to { stroke-dashoffset: 0; } }

        .pawn-group { 
            cursor: pointer; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            pointer-events: all;
        }
        .pawn-selected { filter: drop-shadow(0 0 20px #fff); transform: translateY(-10px) scale(1.3) !important; z-index: 100; }
        
        .pawn-can-move { animation: jump 0.8s infinite alternate; }
        @keyframes jump { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        #win-msg { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <div id="board-container">
        <svg id="svg-board" viewBox="0 0 1000 1000">
            <g id="links-layer"></g>
            <g id="slots-layer"></g>
            <g id="pawns-layer"></g>
        </svg>
    </div>

    <div id="sidebar">
        <div class="header-logo">BIOMAS EM GUERRA</div>
        <div id="turn-display" style="text-align: center; font-weight: 900; color: var(--invader-color); font-size: 1.4rem;">TURNO: INVASORES</div>
        
        <div class="dice-panel">
            <div id="dice-face">🎲</div>
            <button class="btn" id="roll-btn">ROLAR DADO</button>
        </div>

        <div id="hint" class="hint-text">BEM-VINDO! ROLE O DADO</div>
        
        <div id="log-area"></div>
    </div>

    <div id="win-msg">
        <h1 id="win-title" style="font-family: Fredoka One; font-size: 4rem; color: #fff; margin-bottom: 20px;">VENCERAM!</h1>
        <button class="btn" style="width: auto; padding: 20px 40px;" onclick="location.reload()">JOGAR NOVAMENTE</button>
    </div>

    <script>
        const CONFIG = [
            { id: 'AM', n: 'Amazônia', c: '#00ff7f', a: -90 },
            { id: 'CE', n: 'Cerrado', c: '#ffa502', a: -30 },
            { id: 'CA', n: 'Caatinga', c: '#ff7f50', a: 30 },
            { id: 'MA', n: 'Mata Atlântica', c: '#3273ff', a: 90 },
            { id: 'CO', n: 'Costão', c: '#5fdfff', a: 150 },
            { id: 'PA', n: 'Pantanal', c: '#575fcf', a: 210 }
        ];

        class GameEngine {
            constructor() {
                this.turn = 'INVADER'; 
                this.dice = 0;
                this.phase = 'ROLL'; 
                this.spaces = {};
                this.pawns = [];
                this.selected = null;
                this.dests = [];

                this.initGraph();
                this.initPawns();
                this.bindEvents();
                this.refreshUI();
            }

            initGraph() {
                this.addSpace('CENTER', 500, 500, 'HOME');
                CONFIG.forEach(b => {
                    let prev = 'CENTER';
                    for (let i = 1; i <= 4; i++) {
                        const sid = `r-${b.id}-${i}`;
                        const radius = (420 / 5) * i;
                        const x = 500 + radius * Math.cos(b.a * Math.PI / 180);
                        const y = 500 + radius * Math.sin(b.a * Math.PI / 180);
                        this.addSpace(sid, x, y, 'STEP');
                        this.connect(prev, sid);
                        prev = sid;
                    }
                    this.addSpace(b.id, 500 + 420 * Math.cos(b.a * Math.PI / 180), 500 + 420 * Math.sin(b.a * Math.PI / 180), 'BIOME', b.n, b.c);
                    this.connect(prev, b.id);
                });

                CONFIG.forEach((b, i) => {
                    const next = CONFIG[(i + 1) % 6];
                    let prev = b.id;
                    for (let j = 1; j <= 6; j++) {
                        const sid = `c-${b.id}-${next.id}-${j}`;
                        const startA = b.a;
                        const endA = (i === 5 ? (b.a + 60) : next.a);
                        const a = (startA + (endA - startA) * (j / 7)) * Math.PI / 180;
                        const x = 500 + 420 * Math.cos(a);
                        const y = 500 + 420 * Math.sin(a);
                        this.addSpace(sid, x, y, 'STEP');
                        this.connect(prev, sid);
                        prev = sid;
                    }
                    this.connect(prev, next.id);
                });
                this.renderGraph();
            }

            addSpace(id, x, y, type, name = '', color = null) {
                this.spaces[id] = { id, x, y, type, name, color, links: [] };
            }

            connect(a, b) {
                this.spaces[a].links.push(b);
                this.spaces[b].links.push(a);
            }

            initPawns() {
                this.pawns.push({ id: 'i1', side: 'INVADER', pos: 'CENTER', color: '#ff4d4d', icon: '💀' });
                this.pawns.push({ id: 'i2', side: 'INVADER', pos: 'CENTER', color: '#ff4d4d', icon: '💀' });
                this.pawns.push({ id: 'i3', side: 'INVADER', pos: 'CENTER', color: '#ff4d4d', icon: '💀' });
                CONFIG.forEach(b => {
                    this.pawns.push({ id: `p-${b.id}`, side: 'FOREST', pos: b.id, color: b.c, icon: '🌳' });
                });
                this.renderPawns();
            }

            renderGraph() {
                const sL = document.getElementById('slots-layer');
                const lL = document.getElementById('links-layer');
                const seenPairs = new Set();

                Object.values(this.spaces).forEach(s => {
                    s.links.forEach(lid => {
                        const pair = [s.id, lid].sort().join(':');
                        if (!seenPairs.has(pair)) {
                            seenPairs.add(pair);
                            const t = this.spaces[lid];
                            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', s.x); line.setAttribute('y1', s.y);
                            line.setAttribute('x2', t.x); line.setAttribute('y2', t.y);
                            line.setAttribute('class', 'link-line');
                            lL.appendChild(line);
                        }
                    });

                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.setAttribute('class', 'slot');
                    g.addEventListener('click', (e) => this.onSpaceClick(s.id));

                    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    c.setAttribute('cx', s.x); c.setAttribute('cy', s.y);
                    c.setAttribute('r', s.type === 'HOME' ? 45 : (s.type === 'BIOME' ? 35 : 18));
                    c.setAttribute('id', `circle-${s.id}`);
                    if (s.color) c.style.stroke = s.color;
                    g.appendChild(c);

                    // Large click target
                    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    hit.setAttribute('cx', s.x); hit.setAttribute('cy', s.y);
                    hit.setAttribute('r', 40); hit.setAttribute('fill', 'transparent');
                    g.appendChild(hit);

                    sL.appendChild(g);
                });
            }

            renderPawns() {
                const layer = document.getElementById('pawns-layer');
                layer.innerHTML = '';
                const posGroups = {};
                this.pawns.forEach(p => { 
                    posGroups[p.pos] = posGroups[p.pos] || []; 
                    posGroups[p.pos].push(p); 
                });

                Object.entries(posGroups).forEach(([sid, ps]) => {
                    const space = this.spaces[sid];
                    ps.forEach((p, idx) => {
                        // Offset pawns so they never overlap purely
                        const ox = (idx - (ps.length-1)/2) * 35;
                        const oy = ps.length > 2 ? (idx % 2 === 0 ? -15 : 15) : 0;
                        
                        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        g.setAttribute('class', `pawn-group`);
                        if (this.selected === p) g.classList.add('pawn-selected');
                        if (this.phase === 'PIECE' && p.side === this.turn) g.classList.add('pawn-can-move');
                        
                        // Use transform to move pawns
                        g.setAttribute('transform', `translate(${space.x + ox}, ${space.y + oy})`);
                        
                        // In SELECT_DEST phase, pawns should NOT block the slot under them
                        if (this.phase === 'DEST') {
                            g.style.pointerEvents = 'none'; 
                        } else {
                            g.style.pointerEvents = 'all';
                            g.addEventListener('click', (e) => {
                                e.stopPropagation();
                                this.onPawnClick(p);
                            });
                        }

                        const pth = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        pth.setAttribute('d', 'M-20,20 L20,20 L15,-10 C15,-20 0,-35 0,-35 C0,-35 -15,-20 -15,-10 Z');
                        pth.setAttribute('fill', p.color); pth.setAttribute('stroke', '#fff'); pth.setAttribute('stroke-width', '3');
                        g.appendChild(pth);

                        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        txt.setAttribute('y', -20); txt.setAttribute('text-anchor', 'middle');
                        txt.setAttribute('fill', '#fff'); txt.setAttribute('font-size', '20'); txt.setAttribute('font-weight', '900');
                        txt.textContent = p.icon; txt.style.pointerEvents = 'none';
                        g.appendChild(txt);

                        layer.appendChild(g);
                    });
                });
            }

            bindEvents() {
                document.getElementById('roll-btn').addEventListener('click', () => this.rollDice());
            }

            async rollDice() {
                if (this.phase !== 'ROLL') return;
                const diceEl = document.getElementById('dice-face');
                const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
                for(let i=0; i<15; i++) {
                    diceEl.innerText = faces[Math.floor(Math.random()*6)];
                    await new Promise(r => setTimeout(r, 60));
                }
                this.dice = Math.floor(Math.random() * 6) + 1;
                diceEl.innerText = faces[this.dice-1];
                this.phase = 'PIECE';
                this.log(`Tirou ${this.dice}! Escolha seu peão que está pulando.`, this.turn.toLowerCase());
                this.refreshUI();
            }

            onPawnClick(pawn) {
                if (this.phase !== 'PIECE' || pawn.side !== this.turn) return;
                this.selected = pawn;
                this.calcPossibleDests(pawn.pos, this.dice);
                
                if (this.dests.length === 0) {
                    this.log("Sem casas para andar! Perdendo vez.", 'system');
                    this.endTurn();
                    return;
                }
                this.phase = 'DEST';
                this.refreshUI();
                this.log(`Escolha uma das casas brancas piscando!`, 'system');
            }

            calcPossibleDests(startId, dist) {
                this.dests = [];
                let q = [{ id: startId, d: 0, path: [startId] }];
                let finalDests = new Set();

                while(q.length > 0) {
                    let { id, d, path } = q.shift();
                    if (d === dist) {
                        finalDests.add(id);
                        continue;
                    }
                    this.spaces[id].links.forEach(nid => {
                        // Standard rule: Cannot move back immediately to the node you just came from in same turn
                        if (path.length < 2 || nid !== path[path.length - 2]) {
                            q.push({ id: nid, d: d + 1, path: [...path, nid] });
                        }
                    });
                }
                this.dests = Array.from(finalDests);
            }

            onSpaceClick(sid) {
                if (this.phase !== 'DEST' || !this.dests.includes(sid)) return;
                
                const p = this.selected;
                p.pos = sid;
                
                // Combat (Eat rival)
                const rival = this.pawns.find(x => x.pos === sid && x.side !== p.side);
                if (rival) {
                    this.log(`${p.side === 'INVADER' ? 'Invasor' : 'Natureza'} capturou uma peça rival!`, 'system');
                    this.pawns = this.pawns.filter(x => x !== rival);
                }

                this.endTurn();
            }

            endTurn() {
                this.turn = (this.turn === 'INVADER' ? 'FOREST' : 'INVADER');
                this.phase = 'ROLL';
                this.selected = null;
                this.dests = [];
                this.refreshUI();
                this.checkWin();
            }

            refreshUI() {
                // Button
                document.getElementById('roll-btn').disabled = (this.phase !== 'ROLL');
                
                // Status
                const disp = document.getElementById('turn-display');
                disp.innerText = this.turn === 'INVADER' ? 'TURNO: INVASORES' : 'TURNO: NATUREZA';
                disp.style.color = this.turn === 'INVADER' ? 'var(--invader-color)' : 'var(--forest-color)';
                
                // Hint
                const hint = document.getElementById('hint');
                if (this.phase === 'ROLL') hint.innerText = "ROLE O DADO";
                else if (this.phase === 'PIECE') hint.innerText = "CLIQUE NO PEÃO QUE ESTÁ PULANDO";
                else hint.innerText = "CLIQUE NA CASA BRANCA PISCANDO";

                // Highlights
                document.querySelectorAll('circle').forEach(c => c.classList.remove('dest-highlight'));
                this.dests.forEach(id => {
                    const el = document.getElementById(`circle-${id}`);
                    if (el) el.classList.add('dest-highlight');
                });

                this.renderPawns();
            }

            log(m, c) {
                const log = document.getElementById('log-area');
                const div = document.createElement('div');
                div.style.padding = '5px 0';
                div.style.borderBottom = '1px solid #333';
                div.style.color = c === 'invader' ? '#ff7979' : (c === 'forest' ? '#78e08f' : '#f6b93b');
                div.innerText = `> ${m}`;
                log.prepend(div);
            }

            checkWin() {
                const f = this.pawns.filter(x => x.side === 'FOREST').length;
                const i = this.pawns.filter(x => x.side === 'INVADER').length;
                if (i === 0) this.win("A NATUREZA VENCEU!");
                if (f === 0) this.win("OS INVASORES VENCERAM!");
            }

            win(t) {
                document.getElementById('win-title').innerText = t;
                document.getElementById('win-msg').style.display = 'flex';
            }
        }

        window.onload = () => new GameEngine();
    </script>
</body>
</html>
