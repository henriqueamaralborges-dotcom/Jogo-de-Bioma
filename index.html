<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomas em Guerra: Conquista Radial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --accent-invader: #ff3e3e;
            --accent-biome: #00f2ff;
            --card-glass: rgba(15, 20, 30, 0.8);
            --border-glass: rgba(255, 255, 255, 0.1);
            
            --color-amazon: #2aff7f;
            --color-cerrado: #ffcc33;
            --color-caatinga: #ff9933;
            --color-atlantica: #00ba47;
            --color-costao: #33ccff;
            --color-pantanal: #3388ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-areas: 
                "header header"
                "board sidebar";
            grid-template-columns: 1fr 350px;
            grid-template-rows: 100px 1fr;
        }

        header {
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            background: linear-gradient(180, var(--card-glass), transparent);
            border-bottom: 1px solid var(--border-glass);
            z-index: 10;
        }

        .title-area h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #fff, #888);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .turn-indicator {
            text-align: center;
        }
        .turn-indicator h2 {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .turn-indicator p {
            font-weight: 900;
            font-size: 1.2rem;
            transition: 0.3s;
            text-shadow: 0 0 15px currentColor;
        }
        .turn-forest { color: var(--accent-biome); }
        .turn-invader { color: var(--accent-invader); }

        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; display: block; }
        .stat-value { font-family: 'Orbitron'; font-size: 1.1rem; font-weight: 900; }

        #game-board {
            grid-area: board;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #101520 0%, #05070a 70%);
        }

        #svg-canvas {
            width: 90%;
            height: 90%;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }

        aside {
            grid-area: sidebar;
            background: var(--card-glass);
            border-left: 1px solid var(--border-glass);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(10px);
        }

        .stats-panel {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border-glass);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        #battle-log {
            flex: 1;
            overflow-y: auto;
            font-size: 0.8rem;
            padding-right: 10px;
        }
        .log-entry {
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 5px;
            background: rgba(255,255,255,0.02);
            border-left: 3px solid #555;
        }
        .log-entry.biomes { border-color: var(--accent-biome); }
        .log-entry.invader { border-color: var(--accent-invader); }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 15px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-primary {
            background: #fff;
            color: #000;
        }
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        /* SVG Styles */
        .node { cursor: pointer; transition: 0.3s; }
        .node:hover { transform: scale(1.05); }
        .node-base { fill: #000; stroke: #444; stroke-width: 4; }
        .node-biome { stroke-width: 3; }
        
        .bridge { stroke-width: 4; stroke-linecap: round; opacity: 0.15; transition: 0.5s; pointer-events: none; }
        .bridge.radial { stroke: var(--accent-invader); stroke-dasharray: 10 5; }
        .bridge.circular { stroke: var(--accent-biome); }
        .bridge.highlight { opacity: 0.8; stroke-width: 8; stroke-dashoffset: 0; animation: dash 2s linear infinite; }
        
        @keyframes dash {
            from { stroke-dashoffset: 50; }
            to { stroke-dashoffset: 0; }
        }

        /* Pawn Styles */
        .pawn {
            width: 50px; height: 50px; cursor: grab; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }
        .pawn:active { transform: scale(1.2); cursor: grabbing; }
        .pawn.forest { stroke: var(--accent-biome); stroke-width: 3; }
        .pawn.invader { stroke: var(--accent-invader); stroke-width: 3; }
        .pawn-group { pointer-events: none; }
        
        #dice-area {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--border-glass);
        }
        .dice-box { font-size: 2rem; font-family: 'Orbitron'; color: #ffeb3b; text-shadow: 0 0 10px #fbc02d; margin-top: 10px; }

        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
            display: none;
        }
        #modal-content {
            background: var(--bg-dark);
            border: 1px solid var(--border-glass);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="title-area">
            <h1>BIOMAS EM GUERRA</h1>
        </div>
        <div class="turn-indicator">
            <h2 id="phase-display">AÇÃO NATURAL</h2>
            <p id="turn-display" class="turn-forest">PROTEÇÃO DA FLORESTA</p>
        </div>
        <div class="stats-header" style="display: flex; gap: 40px;">
            <div style="text-align: right">
                <span class="stat-label">Bioenergia (Sementes)</span>
                <span class="stat-value" style="color:var(--accent-biome)" id="res-biomes">10</span>
            </div>
            <div style="text-align: left">
                <span class="stat-label">Poder de Destruição</span>
                <span class="stat-value" style="color:var(--accent-invader)" id="res-invader">10</span>
            </div>
        </div>
    </header>

    <main id="game-board">
        <svg id="svg-canvas" viewBox="0 0 1000 1000">
            <!-- Background effects -->
            <defs>
                <radialGradient id="baseGrad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" style="stop-color:#330000;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#000;stop-opacity:1" />
                </radialGradient>
            </defs>
            
            <g id="bridges-layer"></g>
            <g id="biomes-layer"></g>
            <g id="ui-layer"></g>
        </svg>
    </main>

    <aside>
        <div class="stats-panel">
            <h3>DOMÍNIO TERRITORIAL</h3>
            <div id="percentage-bar" style="height: 10px; background: #222; border-radius: 5px; margin: 15px 0; overflow: hidden; display: flex;">
                <div id="bar-biomes" style="width: 85%; background: var(--accent-biome);"></div>
                <div id="bar-invader" style="width: 15%; background: var(--accent-invader);"></div>
            </div>
            <p id="status-text" style="font-size: 0.8rem; color: #888;">Os biomas resistem à invasão central.</p>
        </div>

        <div id="battle-log"></div>

        <div class="controls">
            <div id="dice-area">
                <span class="stat-label">Movimento Disponível</span>
                <div class="dice-box" id="dice-val">1</div>
            </div>
            <button class="btn btn-primary" id="btn-next">PRÓXIMO TURNO</button>
        </div>
    </aside>

    <div id="modal">
        <div id="modal-content">
            <h2 id="modal-title" style="font-family: Orbitron; margin-bottom: 15px;">EVENTO</h2>
            <p id="modal-body" style="color: #ccc; margin-bottom: 25px;"></p>
            <div id="quiz-container" style="display: none; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px;"></div>
            <button class="btn btn-primary" onclick="closeModal()">FECHAR</button>
        </div>
    </div>

    <script>
        const BIOMES_ORDER = [
            { id: 'AMAZONIA', name: 'Amazônia', color: '#2aff7f', img: './onça pintada.ceerto.png' },
            { id: 'CERRADO', name: 'Cerrado', color: '#ffcc33', img: './ema.certo.png' },
            { id: 'CAATINGA', name: 'Caatinga', color: '#ff9933', img: './Jararaca.certo.png' },
            { id: 'ATLANTICA', name: 'Mata Atlântica', color: '#2aff7f', img: './mico leão dourado.certo.png' },
            { id: 'COSTAO', name: 'Costão Rochoso', color: '#33ccff', img: './Preguiça.certo.png' },
            { id: 'PANTANAL', name: 'Pantanal', color: '#3388ff', img: './jacaré,.png' }
        ];

        const EVENTS = [
            { n: 'Aranha Marrom', t: 'Ataque surpresa! Perda de 2 tropas.', v: -2, img: './aranha marrom.certo.png' },
            { n: 'Sucuri', t: 'Caminho bloqueado pela cobra gigante! Movimento extra de 0.', v: 0, img: './sucuri.certo.png' },
            { n: 'Tamanduá Bandeira', t: 'Reforços naturais chegaram! Ganhe 2 tropas.', v: 2, img: './tamandua brandeira.certo.png' }
        ];

        const CONFIG = {
            CENTER: { x: 500, y: 500 },
            RADIUS: 350,
            HEX_SIZE: 100,
            CENTER_SIZE: 120
        };

        class GameEngine {
            constructor() {
                this.turn = 'BIOMES'; 
                this.pawns = [];
                this.movesLeft = 0;
                this.selectedPawn = null;
                
                this.initPositions();
                this.init();
            }

            initPositions() {
                // One guardian for each biome
                BIOMES_ORDER.forEach(b => {
                    this.pawns.push({ id: `guard-${b.id}`, node: b.id, side: 'BIOMES', color: b.color });
                });
                // 3 Invaders at the center
                for(let i=0; i<3; i++) {
                    this.pawns.push({ id: `inv-${i}`, node: 'BASE', side: 'INVADER', color: '#ff3e3e' });
                }
            }

            init() {
                this.renderBoard();
                this.updateUI();
                this.startTurn();
                document.getElementById('btn-next').onclick = () => this.nextTurn();
            }

            startTurn() {
                // Standard pawn game usually has 1 or a die roll. 
                // Let's go with 1 move per turn for simplicity, or 3 moves to distribute.
                this.movesLeft = (this.turn === 'BIOMES') ? 3 : 2; 
                this.log(`Início da rodada: ${this.turn === 'BIOMES' ? 'Apoio aos Biomas' : 'Invasão'}`, "system");
                this.updateUI();
            }

            renderBoard() {
                const biomesLayer = document.getElementById('biomes-layer');
                const bridgesLayer = document.getElementById('bridges-layer');
                const uiLayer = document.getElementById('ui-layer');
                
                biomesLayer.innerHTML = '';
                bridgesLayer.innerHTML = '';
                uiLayer.innerHTML = '';

                // 1. Render Links
                BIOMES_ORDER.forEach((b, i) => {
                    const angle = (Math.PI / 3) * i - (Math.PI / 2);
                    const bx = CONFIG.CENTER.x + CONFIG.RADIUS * Math.cos(angle);
                    const by = CONFIG.CENTER.y + CONFIG.RADIUS * Math.sin(angle);
                    b.x = bx; b.y = by;

                    const rLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    rLine.setAttribute('x1', CONFIG.CENTER.x); rLine.setAttribute('y1', CONFIG.CENTER.y);
                    rLine.setAttribute('x2', bx); rLine.setAttribute('y2', by);
                    rLine.setAttribute('class', 'bridge radial');
                    rLine.id = `bridge-radial-${b.id}`;
                    bridgesLayer.appendChild(rLine);

                    const nextIndex = (i + 1) % 6;
                    const nextAngle = (Math.PI / 3) * nextIndex - (Math.PI / 2);
                    const nbx = CONFIG.CENTER.x + CONFIG.RADIUS * Math.cos(nextAngle);
                    const nby = CONFIG.CENTER.y + CONFIG.RADIUS * Math.sin(nextAngle);

                    const cLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    cLine.setAttribute('x1', bx); cLine.setAttribute('y1', by);
                    cLine.setAttribute('x2', nbx); cLine.setAttribute('y2', nby);
                    cLine.setAttribute('class', 'bridge circular');
                    cLine.id = `bridge-circ-${b.id}-${BIOMES_ORDER[nextIndex].id}`;
                    bridgesLayer.appendChild(cLine);
                });

                // 2. Render Nodes
                const basePts = this.getHexPoints(CONFIG.CENTER.x, CONFIG.CENTER.y, CONFIG.CENTER_SIZE);
                const base = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                base.setAttribute('points', basePts);
                base.setAttribute('class', 'node node-base');
                base.onclick = () => this.handleNodeClick('BASE');
                biomesLayer.appendChild(base);

                BIOMES_ORDER.forEach(b => {
                    const hexPts = this.getHexPoints(b.x, b.y, CONFIG.HEX_SIZE);
                    const hex = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                    hex.setAttribute('points', hexPts);
                    hex.setAttribute('style', `fill: #111; stroke: ${b.color}; stroke-opacity: 0.8;`);
                    hex.setAttribute('class', 'node node-biome');
                    hex.onclick = () => this.handleNodeClick(b.id);
                    biomesLayer.appendChild(hex);

                    const img = document.createElementNS('http://www.w3.org/2000/svg', 'image');
                    img.setAttribute('href', b.img); img.setAttribute('x', b.x - 40); img.setAttribute('y', b.y - 70);
                    img.setAttribute('width', '80'); img.setAttribute('height', '80');
                    img.style.opacity = '0.3';
                    biomesLayer.appendChild(img);
                });

                // 3. Render Pawns
                this.renderPawns();
            }

            renderPawns() {
                const uiLayer = document.getElementById('ui-layer');
                uiLayer.innerHTML = '';

                // Group pawns by node to avoid stacking overlapping
                const groups = {};
                this.pawns.forEach(p => {
                    if(!groups[p.node]) groups[p.node] = [];
                    groups[p.node].push(p);
                });

                Object.entries(groups).forEach(([nodeId, pawns]) => {
                    const nodePos = nodeId === 'BASE' ? CONFIG.CENTER : BIOMES_ORDER.find(b => b.id === nodeId);
                    pawns.forEach((p, i) => {
                        const offset = (i - (pawns.length-1)/2) * 35;
                        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        g.setAttribute('class', `pawn-group`);
                        
                        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circle.setAttribute('cx', nodePos.x + offset); circle.setAttribute('cy', nodePos.y);
                        circle.setAttribute('r', '20');
                        circle.setAttribute('fill', p.side === 'INVADER' ? '#000' : '#fff');
                        circle.setAttribute('stroke', p.side === 'INVADER' ? '#f00' : p.color);
                        circle.setAttribute('stroke-width', this.selectedPawn === p ? '5' : '2');
                        circle.setAttribute('class', 'pawn');
                        circle.onclick = (e) => { e.stopPropagation(); this.handlePawnClick(p); };
                        
                        // Icon inside pawn
                        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        t.setAttribute('x', nodePos.x + offset); t.setAttribute('y', nodePos.y + 6);
                        t.setAttribute('text-anchor', 'middle');
                        t.setAttribute('fill', p.side === 'INVADER' ? '#f00' : '#000');
                        t.setAttribute('font-size', '16'); t.style.pointerEvents = 'none';
                        t.textContent = p.side === 'INVADER' ? '👹' : '🍃';
                        
                        g.appendChild(circle);
                        g.appendChild(t);
                        uiLayer.appendChild(g);
                    });
                });
            }

            handlePawnClick(p) {
                if (this.turn !== p.side || this.movesLeft <= 0) return;
                this.selectedPawn = p;
                this.highlightPaths();
                this.updateUI();
            }

            handleNodeClick(nodeId) {
                if (this.selectedPawn) {
                    this.movePawn(this.selectedPawn, nodeId);
                }
            }

            movePawn(pawn, toNodeId) {
                if (!this.canReach(pawn.node, toNodeId)) {
                    this.log("Caminho não permitido!", "system");
                    return;
                }

                this.log(`${this.turn}: Peça movida para ${toNodeId}`, this.turn.toLowerCase());
                
                // Attack logic
                const enemiesAtDest = this.pawns.filter(p => p.node === toNodeId && p.side !== this.turn);
                if (enemiesAtDest.length > 0) {
                    this.resolveConflict(pawn, enemiesAtDest[0]);
                }

                pawn.node = toNodeId;
                this.movesLeft--;
                this.selectedPawn = null;
                
                if (this.movesLeft <= 0) {
                    this.log("Ações esgotadas para este turno.", "system");
                }
                
                this.highlightPaths();
                this.renderPawns();
                this.updateUI();
                this.checkVictory();
            }

            resolveConflict(attacker, defender) {
                const aRoll = Math.floor(Math.random() * 6) + 1;
                const dRoll = Math.floor(Math.random() * 6) + 1;
                this.log(`Confronto: ${aRoll} vs ${dRoll}`, "system");
                
                if (aRoll >= dRoll) {
                    this.log(`${defender.side} removido do tabuleiro!`, "system");
                    this.pawns = this.pawns.filter(p => p !== defender);
                } else {
                    this.log(`Ataque falhou!`, "system");
                }
            }

            nextTurn() {
                this.turn = this.turn === 'BIOMES' ? 'INVADER' : 'BIOMES';
                this.selectedPawn = null;
                this.startTurn();
                this.highlightPaths();
                this.renderPawns();
                this.updateUI();
            }

            updateUI() {
                document.getElementById('turn-display').innerText = this.turn === 'BIOMES' ? 'TURNO DO GUARDIÃO' : 'TURNO DO INVASOR';
                document.getElementById('turn-display').className = this.turn === 'BIOMES' ? 'turn-forest' : 'turn-invader';
                document.getElementById('dice-val').innerText = this.movesLeft;
                
                const btn = document.getElementById('btn-next');
                btn.innerText = `PASSAR TURNO`;
                btn.style.opacity = this.movesLeft <= 0 ? '1' : '0.5';

                // Update domain bar (simplified for pawn game)
                let bCount = this.pawns.filter(p => p.side === 'BIOMES').length;
                let iCount = this.pawns.filter(p => p.side === 'INVADER').length;
                const total = bCount + iCount;
                document.getElementById('bar-biomes').style.width = (bCount / total * 100) + '%';
                document.getElementById('bar-invader').style.width = (iCount / total * 100) + '%';
            }

            canReach(from, to) {
                if (from === to) return false;
                const isRadial = (from === 'BASE' && to !== 'BASE') || (to === 'BASE' && from !== 'BASE');
                const isCircular = from !== 'BASE' && to !== 'BASE' && this.areNeighbors(from, to);

                if (this.turn === 'INVADER') {
                    if (isRadial) return true;
                    // invader needs a bridgehead to use circular
                    const attackerOwnsFrom = true; // Simplified for pawn game: they can move if they are there
                    return isCircular; 
                } else {
                    return isCircular || isRadial;
                }
            }

            areNeighbors(id1, id2) {
                const i1 = BIOMES_ORDER.findIndex(b => b.id === id1);
                const i2 = BIOMES_ORDER.findIndex(b => b.id === id2);
                if (i1 === -1 || i2 === -1) return false;
                const diff = Math.abs(i1 - i2);
                return diff === 1 || diff === 5;
            }

            checkVictory() {
                const invaders = this.pawns.filter(p => p.side === 'INVADER');
                const guardians = this.pawns.filter(p => p.side === 'BIOMES');
                
                if (invaders.length === 0) this.showModal("VITÓRIA", "Os biomas repeliram a ameaça!");
                if (guardians.length === 0) this.showModal("DERROTA", "A floresta sucumbiu.");
            }

            getHexPoints(cx, cy, r) {
                let pts = [];
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI / 3) * i - (Math.PI / 6);
                    pts.push(`${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`);
                }
                return pts.join(' ');
            }

            highlightPaths() {
                document.querySelectorAll('.bridge').forEach(b => b.classList.remove('highlight'));
                if (!this.selectedPawn) return;
                BIOMES_ORDER.concat({id:'BASE'}).forEach(t => {
                    if(this.canReach(this.selectedPawn.node, t.id)) {
                        // find matching line
                        const n1 = this.selectedPawn.node, n2 = t.id;
                        const selector = n1 === 'BASE' || n2 === 'BASE' ? 
                            `#bridge-radial-${n1==='BASE'?n2:n1}` : 
                            `#bridge-circ-${n1}-${n2}, #bridge-circ-${n2}-${n1}`;
                        document.querySelectorAll(selector).forEach(l => l.classList.add('highlight'));
                    }
                });
            }

            log(msg, type) {
                const log = document.getElementById('battle-log');
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                entry.textContent = `> ${msg}`;
                log.prepend(entry);
                if (log.children.length > 20) log.lastChild.remove();
            }

            checkVictory() {
                let biomesOwnedByInvader = 0;
                BIOMES_ORDER.forEach(b => {
                    if (this.territories[b.id].owner === 'INVADER') biomesOwnedByInvader++;
                });

                if (biomesOwnedByInvader === 6) {
                    this.showModal("FIM DE JOGO", "Os invasores dominaram todos os biomas. A natureza sucumbiu.");
                } else if (this.territories.BASE.owner === 'BIOMES') {
                    this.showModal("VITÓRIA!", "A base dos invasores foi destruída! A natureza prevalece.");
                }
            }

            showModal(title, body, img) {
                document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-body').innerText = body;
                if (img) {
                    document.getElementById('modal-body').innerHTML += `<br><img src="${img}" style="max-height:150px; margin-top:20px; border-radius:10px; border: 1px solid var(--border-glass)">`;
                }
                document.getElementById('modal').style.display = 'flex';
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        const game = new GameEngine();
    </script>
