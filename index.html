<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Biomes at War</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --guardian: #00ff66;
            --invader: #ff3300;
            --highlight: #ffffcc;
            --bg-dark: #121212;
            --pixel-border: 4px;
        }

        * { margin:0; padding:0; box-sizing:border-box; image-rendering: pixelated; }

        body { 
            background: var(--bg-dark); 
            font-family: 'Silkscreen', sans-serif; 
            height: 100vh; 
            display: grid;
            grid-template-areas: "header header" "board sidebar";
            grid-template-columns: 1fr 400px;
            grid-template-rows: 90px 1fr;
            overflow: hidden;
            color: #fff;
        }

        #start-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('mapa.png');
            background-size: cover;
            background-position: center;
            border: 10px double var(--highlight);
            box-shadow: inset 0 0 100px #000;
        }

        .pixel-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 3.5rem;
            color: var(--highlight);
            text-shadow: 6px 6px 0px #ff3300, 10px 10px 0px #000;
            margin-bottom: 50px;
            text-align: center;
            line-height: 1.2;
            animation: pulseTitle 2s infinite ease-in-out;
        }

        @keyframes pulseTitle {
            0%, 100% { transform: scale(1); text-shadow: 6px 6px 0px #ff3300; }
            50% { transform: scale(1.05); text-shadow: 10px 10px 0px #ff0000; }
        }

        .start-btn {
            font-family: 'Press Start 2P', cursive;
            padding: 30px 60px;
            background: #27ae60;
            color: #fff;
            border: 6px solid #fff;
            cursor: pointer;
            box-shadow: 8px 8px 0px #000;
            transition: 0.1s;
            animation: pulseBtn 1.5s infinite ease-in-out;
        }
        .start-btn:hover { background: #2ecc71; animation-play-state: paused; }
        .start-btn:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0px #000; }

        @keyframes pulseBtn {
            0%, 100% { transform: scale(1); box-shadow: 8px 8px 0px #000; }
            50% { transform: scale(1.1); box-shadow: 12px 12px 0px rgba(0,0,0,0.5); }
        }

        header {
            grid-area: header;
            background: #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 8px solid #333;
            z-index: 100;
        }
        .logo { font-family: 'Press Start 2P'; font-size: 1.5rem; color: #fff; text-shadow: 3px 3px 0 #000; }

        #board-viewer {
            grid-area: board;
            position: relative;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 8px solid #222;
        }
        #game-svg { width: 100%; height: 100%; }

        #sidebar {
            grid-area: sidebar;
            background: #111;
            border-left: 8px solid #333;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .ui-box { background: #000; border: 6px solid #333; padding: 25px; text-align: center; }
        #dice-view { font-size: 4rem; margin-bottom: 20px; font-family: 'Press Start 2P'; color: var(--highlight); }
        
        .btn { 
            width: 100%; padding: 20px; border: 4px solid var(--highlight); 
            font-family: 'Press Start 2P'; font-size: 1rem; cursor: pointer; transition: 0.1s;
            background: #222; color: var(--highlight); box-shadow: 6px 6px 0px #000;
        }
        .btn:hover:not(:disabled) { background: #333; transform: translate(-2px, -2px); box-shadow: 8px 8px 0px #000; }
        .btn:active:not(:disabled) { transform: translate(4px, 4px); box-shadow: 2px 2px 0px #000; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .hint { background: #000; padding: 15px; border: 4px solid var(--highlight); color: var(--highlight); font-family: 'Press Start 2P'; font-size: 0.7rem; text-align: center; text-transform: uppercase; }

        #log { flex: 1; background: #000; border: 4px solid #222; padding: 15px; overflow-y: auto; font-size: 0.8rem; color: #aaa; font-family: 'Silkscreen'; }

        /* Game tiles */
        .node-tile {
            fill: rgba(255,255,255,0.3);
            stroke: rgba(255,255,255,0.6);
            stroke-width: 4;
            cursor: pointer;
        }
        .node-biome {
            fill: rgba(255, 255, 255, 0.1);
            stroke: rgba(255, 255, 255, 0.4);
            stroke-width: 6;
            cursor: pointer;
        }
        .node-start {
            fill: rgba(255,255,255,0.1);
            stroke: rgba(255,255,255,0.2);
            stroke-width: 4;
        }
        .debuff-tile {
            fill: #ff0000 !important;
            fill-opacity: 0.7 !important;
            stroke: #ffffff !important;
            stroke-width: 6 !important;
        }

        .target-active { 
            stroke: #fff !important; stroke-width: 10 !important; 
            stroke-dasharray: 8 8; animation: dashAnim 1s linear infinite; 
            fill: rgba(255,255,255,0.6) !important;
        }
        @keyframes dashAnim { from { stroke-dashoffset: 16; } to { stroke-dashoffset: 0; } }

        /* Pawns */
        .pawn-g { transition: transform 0.4s steps(10); }
        .pawn-visual { filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.8)); cursor: pointer; }
        .pawn-jumping { animation: pixelPop 0.4s infinite steps(2); }
        @keyframes pixelPop { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
        .pawn-selected { filter: drop-shadow(0 0 10px #fff); transform: scale(1.2); }
        .pawn-shielded { filter: drop-shadow(0 0 15px #00ffff) !important; stroke: #00ffff !important; stroke-width: 8 !important; }

        .buff-tile {
            fill: #00ff66 !important;
            fill-opacity: 0.7 !important;
            stroke: #ffffff !important;
            stroke-width: 6 !important;
        }

        /* Particles */
        .dust-particle { position: absolute; width: 8px; height: 8px; background: #888; pointer-events: none; z-index: 1000; }
        .confetti-particle { position: absolute; width: 10px; height: 10px; pointer-events: none; z-index: 10001; }

        @keyframes dustAnim { 
            0% { transform: scale(1) translate(0,0); opacity: 1; }
            100% { transform: scale(0) translate(var(--dx), var(--dy)); opacity: 0; }
        }

        #win-modal { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; border: 20px double var(--highlight); overflow: hidden; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1 class="pixel-title">BIOMES<br>AT WAR</h1>
        <button class="start-btn" onclick="startGame()">START GAME</button>
    </div>

    <!-- Transition Screen with GIF -->
    <div id="transition-screen" style="display:none; position:fixed; inset:0; background:#000; z-index:10000; flex-direction:column; align-items:center; justify-content:center; opacity:0; transition: opacity 0.8s ease-in-out;">
        <img src="gifarrt.gif" style="width:100%; height:100%; object-fit:contain; image-rendering:pixelated;">
    </div>

    <header>
        <div class="logo">BIOMES AT WAR</div>
        <div id="stat-turn" style="color:var(--invader); font-weight: 900; font-size: 1.2rem; font-family:'Press Start 2P'">TURN: INVADERS</div>
    </header>

    <div id="board-viewer">
        <!-- Debuff Card Overlay -->
        <div id="debuff-overlay" style="display:none; position:absolute; inset:0; background:rgba(255,0,0,0.6); z-index:2000; display:none; flex-direction:column; align-items:center; justify-content:center; animation: fadeIn 0.3s;">
            <div style="background:#111; border:8px solid var(--highlight); padding:30px; text-align:center; max-width:400px; box-shadow: 15px 15px 0px rgba(0,0,0,0.8);">
                <h2 style="font-family:'Press Start 2P'; font-size:1.5rem; color:#ff3300; margin-bottom:20px;">DANGER!</h2>
                <div id="debuff-img-container" style="border:4px solid #333; margin-bottom:20px; background:#000; padding: 10px;">
                    <img id="debuff-card-img" src="" style="max-width:250px; display:block;">
                </div>
                <p id="debuff-msg" style="font-family:'Silkscreen'; font-size:1.2rem; margin-bottom:25px; color:#aaa;">A natural predator has delayed you!</p>
                <button class="btn" style="background:#ff3300; color:#fff; border-color:#fff;" onclick="closeDebuff()">GO BACK</button>
            </div>
        </div>

        <svg id="game-svg" viewBox="0 0 1024 1024" preserveAspectRatio="xMidYMid meet">
            <image href="mapa.png" x="0" y="0" width="1024" height="1024" />
            <g id="lay-nodes"></g> 
            <g id="lay-pawns"></g>
        </svg>
    </div>

    <div id="sidebar">
        <div class="ui-box">
            <div id="dice-view">🎲</div>
            <button class="btn" id="roll-btn">ROLL DICE</button>
        </div>
        <div id="game-hint" class="hint">ROLL THE DICE!</div>
        <div id="log"></div>
    </div>

    <div id="win-modal">
        <h1 id="win-txt" style="font-family: Fredoka One; font-size: 5rem; color: #fff; margin-bottom: 20px;">WINNER!</h1>
        <button class="btn" style="width: auto; padding: 25px 60px;" onclick="location.reload()">NEW GAME</button>
    </div>

    <script>
        const CX = 510, CY = 500; 

        const BIOMAS = [
            { id: 'CAA', n: 'Caatinga',       x: 170, y:  55, diff: 0.15 },
            { id: 'PAN', n: 'Pantanal',        x: 755, y:  95, diff: 0.15 },
            { id: 'CER', n: 'Cerrado',         x: 930, y: 480, diff: 0.15 },
            { id: 'AMZ', n: 'Amazon',          x: 800, y: 880, diff: 0.5 },
            { id: 'MAT', n: 'Atlantic Forest', x: 255, y: 895, diff: 0.05 },
            { id: 'COS', n: 'Rocky Coast',     x:  80, y: 490, diff: 0.15 }
        ];

        const RADS = {
            'CAA': [[478,460],[450,415],[425,370],[398,325],[370,280],[340,235],[308,188],[268,145],[218,100]],
            'PAN': [[545,465],[575,425],[608,385],[640,345],[670,305],[700,262],[722,220],[740,175],[748,132]],
            'CER': [[560,495],[610,492],[660,490],[710,488],[758,486],[808,484],[858,482],[900,480]],
            'AMZ': [[545,540],[570,585],[598,630],[625,675],[655,718],[690,760],[722,800],[760,842],[785,878]],
            'MAT': [[478,542],[448,588],[420,632],[392,678],[365,722],[338,768],[310,812],[280,855],[260,892]],
            'COS': [[462,498],[415,496],[368,494],[320,492],[272,490],[225,488],[178,486],[128,488]]
        };

        const RING = {
            'CAA-PAN': [[222,62],[278,48],[338,38],[398,35],[458,35],[518,40],[578,50],[638,62],[698,80]],
            'PAN-CER': [[790,135],[815,180],[838,228],[858,278],[875,328],[890,378],[900,428],[918,460]],
            'CER-AMZ': [[935,525],[930,575],[920,628],[905,680],[888,730],[868,778],[845,822],[820,858]],
            'AMZ-MAT': [[755,912],[700,932],[645,948],[590,955],[535,955],[480,948],[425,938],[370,922],[315,905]],
            'MAT-COS': [[215,875],[182,838],[155,795],[135,748],[118,698],[105,648],[95,598],[88,548],[82,510]],
            'COS-CAA': [[78,455],[82,405],[90,355],[102,305],[118,258],[138,212],[158,168],[175,125],[172,82]]
        };

        const DEBUFF_IMAGES = {
            'Jararaca.certo.png': { n: 'Jararaca', p: 2 },
            'aranha marrom.certo.png': { n: 'Brown Spider', p: 1 },
            'jacaré,.png': { n: 'Alligator', p: 3 },
            'onça pintada.ceerto.png': { n: 'Jaguar', p: 4 },
            'sucuri.certo.png': { n: 'South Am. Boa', p: 6 }
        };

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            const trans = document.getElementById('transition-screen');
            trans.style.display = 'flex';
            
            // Fade In
            setTimeout(() => { trans.style.opacity = '1'; }, 50);

            // Wait for GIF animation (approx 2.5 seconds)
            setTimeout(() => {
                trans.style.opacity = '0';
                setTimeout(() => {
                    trans.style.display = 'none';
                }, 800);
            }, 3000);
        }

        function closeDebuff() {
            document.getElementById('debuff-overlay').style.display = 'none';
            if (window.game) window.game.handleDebuffPenalty();
        }

        class JogoEngine {
            constructor() {
                this.turn = 'INVADER'; this.dice = 0; this.state = 'ROLL';
                this.nodes = {}; this.pawns = []; this.selected = null;
                this.dests = []; this.pendingMove = null;
                this.buildGraph(); this.buildPawns(); this.bindUI(); this.refresh();
                window.game = this;
            }

            buildGraph() {
                this.addN('START', CX, CY, 'START');
                BIOMAS.forEach(b => {
                    const pts = RADS[b.id]; let prev = 'START';
                    pts.forEach((p, i) => {
                        const id = `r-${b.id}-${i}`;
                        let type = 'STEP';
                        if (b.id === 'AMZ') {
                             type = (i % 2 === 0 || Math.random() < 0.4) ? 'DEBUFF' : 'STEP';
                        } else if (b.id === 'MAT') {
                             type = (i > 0 && Math.random() < 0.05) ? 'DEBUFF' : 'STEP';
                        } else {
                             type = (i % 5 === 2 || Math.random() < 0.1) ? 'DEBUFF' : 'STEP';
                        }
                        
                        // Small chance for BUFF tiles on every path
                        if (type === 'STEP' && Math.random() < 0.1) type = 'BUFF';

                        this.addN(id, p[0], p[1], type);
                        this.linkN(prev, id); prev = id;
                    });
                    this.addN(b.id, b.x, b.y, 'BIOME');
                    this.linkN(prev, b.id);
                });

                Object.keys(RING).forEach(key => {
                    const [fromId, toId] = key.split('-');
                    const pts = RING[key]; let prev = fromId;
                    const targetBiome = BIOMAS.find(b => b.id === toId);
                    const ringDiff = targetBiome ? targetBiome.diff : 0.15;

                    pts.forEach((p, j) => {
                        const id = `c-${key}-${j}`;
                        let type = (Math.random() < ringDiff) ? 'DEBUFF' : 'STEP';
                        if (toId === 'AMZ' && j > 4) type = 'DEBUFF';
                        if (type === 'STEP' && Math.random() < 0.15) type = 'BUFF';

                        this.addN(id, p[0], p[1], type);
                        this.linkN(prev, id); prev = id;
                    });
                    this.linkN(prev, toId);
                });
                this.drawNodes();
            }

            addN(id, x, y, type) { this.nodes[id] = { id, x, y, type, links: [] }; }
            linkN(a, b) { this.nodes[a].links.push(b); this.nodes[b].links.push(a); }

            buildPawns() {
                for (let i = 1; i <= 3; i++) {
                    this.pawns.push({ id: `inv${i}`, side: 'INVADER', node: 'START', color: '#ff3300', icon: '💀', shield: false, boost: 0 });
                    this.pawns.push({ id: `grd${i}`, side: 'GUARD', node: 'START', color: '#00ff66', icon: '🛡️', shield: false, boost: 0 });
                }
                this.drawPawns();
            }

            drawNodes() {
                const layer = document.getElementById('lay-nodes');
                layer.innerHTML = '';
                Object.values(this.nodes).forEach(n => {
                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.style.cursor = 'pointer';
                    g.addEventListener('click', () => this.onNodeClick(n.id));
                    
                    if (n.type === 'STEP' || n.type === 'DEBUFF' || n.type === 'BUFF') {
                        const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        const s = 34; 
                        r.setAttribute('x', n.x - s / 2); r.setAttribute('y', n.y - s / 2);
                        r.setAttribute('width', s); r.setAttribute('height', s);
                        r.setAttribute('id', `tile-${n.id}`);
                        
                        let cls = 'node-tile';
                        if (n.type === 'DEBUFF') cls += ' debuff-tile';
                        if (n.type === 'BUFF') cls += ' buff-tile';
                        r.setAttribute('class', cls);
                        
                        if (n.type === 'DEBUFF') r.setAttribute('fill', '#ff0000');
                        if (n.type === 'BUFF') r.setAttribute('fill', '#00ff66');

                        g.appendChild(r);
                    } else {
                        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        c.setAttribute('cx', n.x); c.setAttribute('cy', n.y);
                        c.setAttribute('r', n.type === 'START' ? 60 : 40);
                        c.setAttribute('class', n.type === 'START' ? 'node-start' : 'node-biome');
                        c.setAttribute('id', `tile-${n.id}`); g.appendChild(c);
                    }
                    layer.appendChild(g);
                });
            }

            drawPawns() {
                const layer = document.getElementById('lay-pawns');
                layer.innerHTML = '';
                const groups = {};
                this.pawns.forEach(p => { groups[p.node] = groups[p.node] || []; groups[p.node].push(p); });

                Object.entries(groups).forEach(([nid, ps]) => {
                    const n = this.nodes[nid];
                    ps.forEach((p, idx) => {
                        const cols = Math.min(ps.length, 3);
                        const ox = (idx % cols - (cols - 1) / 2) * 35;
                        const oy = Math.floor(idx / cols) * 40;
                        const mg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        mg.setAttribute('transform', `translate(${n.x + ox}, ${n.y + oy - 10})`);
                        mg.setAttribute('class', 'pawn-g');

                        const body = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        body.setAttribute('d', 'M-15,20 L15,20 L15,0 L10,0 L10,-10 L5,-10 L5,-20 L-5,-20 L-5,-10 L-10,-10 L-10,0 L-15,0 Z');
                        body.setAttribute('fill', p.color); body.setAttribute('stroke', '#fff');
                        body.setAttribute('stroke-width', '4'); body.setAttribute('class', 'pawn-visual');
                        if (this.selected === p) body.classList.add('pawn-selected');
                        if (this.state === 'PICK' && p.side === this.turn) body.classList.add('pawn-jumping');
                        if (p.shield) body.classList.add('pawn-shielded');

                        mg.addEventListener('click', (e) => { e.stopPropagation(); this.onPawnClick(p); });
                        const icon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        icon.setAttribute('y', -4); icon.setAttribute('text-anchor', 'middle');
                        icon.setAttribute('font-size', '16'); icon.setAttribute('fill', '#000');
                        icon.textContent = p.icon; mg.appendChild(body); mg.appendChild(icon); layer.appendChild(mg);
                    });
                });
            }

            bindUI() { document.getElementById('roll-btn').onclick = () => this.rollDice(); }

            async rollDice() {
                if (this.state !== 'ROLL') return;
                const dv = document.getElementById('dice-view');
                for (let i = 0; i < 15; i++) {
                    dv.innerText = Math.floor(Math.random() * 6) + 1;
                    await new Promise(r => setTimeout(r, 60));
                }
                this.dice = Math.floor(Math.random() * 6) + 1;
                
                // Mata Atlântica Power: +1 on move
                const activePawns = this.pawns.filter(p => p.side === this.turn);
                if (activePawns.some(p => p.node.includes('MAT'))) {
                    this.dice++;
                    this.addLog("Atlantic Forest Power: +1 movement!");
                }

                dv.innerText = this.dice; this.state = 'PICK'; this.refresh();
            }

            onPawnClick(p) {
                if (this.state !== 'PICK' || p.side !== this.turn) return;
                this.selected = p; 
                
                // Amazon Power: Speed boost (+2 tiles) after surviving debuff
                let boost = p.boost || 0;
                this.findDests(p.node, this.dice + boost);
                if (this.dests.length === 0) { this.addLog("No possible paths!"); this.endTurn(); return; }
                this.state = 'MOVE'; this.refresh();
            }

            findDests(start, dist) {
                this.dests = []; const q = [{ id: start, d: 0, path: [start] }];
                const found = new Set();
                while (q.length > 0) {
                    const { id, d, path } = q.shift();
                    if (d === dist) { found.add(id); continue; }
                    this.nodes[id].links.forEach(next => {
                        if (path.length < 2 || next !== path[path.length - 2]) {
                            q.push({ id: next, d: d + 1, path: [...path, next] });
                        }
                    });
                }
                this.dests = Array.from(found).filter(x => x !== start);
            }

            onNodeClick(id) {
                if (this.state !== 'MOVE' || !this.dests.includes(id)) return;
                const p = this.selected; const old = p.node;
                this.pendingMove = { pawn: p, from: old, to: id };
                
                this.spawnDust(this.nodes[old].x, this.nodes[old].y);

                if (this.nodes[id].type === 'DEBUFF') {
                    if (p.shield) {
                        this.addLog("Shield blocked the danger!");
                        p.shield = false;
                        this.completeMove();
                    } else {
                        const imgList = Object.keys(DEBUFF_IMAGES);
                        const img = imgList[Math.floor(Math.random() * imgList.length)];
                        this.activeDebuffImg = img;
                        document.getElementById('debuff-card-img').src = img;
                        document.getElementById('debuff-overlay').style.display = 'flex';
                    }
                } else if (this.nodes[id].type === 'BUFF') {
                     this.triggerBuff();
                } else { 
                    this.completeMove(); 
                }
            }

            handleDebuffPenalty() {
                const info = DEBUFF_IMAGES[this.activeDebuffImg];
                this.addLog(`${info.n} penalty: Move back ${info.p} tiles!`);
                
                // Better pathfinding back to START
                const path = this.findPathToStart(this.pendingMove.to);
                // The path starts with 'to'. We want the step at index info.p (or last if path shorter)
                const targetIdx = Math.min(info.p, path.length - 1);
                const finalNode = path[targetIdx];
                
                this.pendingMove.to = finalNode; 
                this.completeMove(true);
            }

            findPathToStart(startId) {
                const q = [[startId]];
                const visited = new Set([startId]);
                while (q.length > 0) {
                    const path = q.shift();
                    const curr = path[path.length - 1];
                    if (curr === 'START') return path;
                    this.nodes[curr].links.forEach(nb => {
                        if (!visited.has(nb)) {
                            visited.add(nb);
                            q.push([...path, nb]);
                        }
                    });
                }
                return [startId];
            }

            triggerBuff() {
                const buffs = ['EXTRA','SHIELD','WARP'];
                const b = buffs[Math.floor(Math.random()*buffs.length)];
                if (b === 'EXTRA') {
                    this.addLog("BUFF: Extra Move!");
                    this.selected.extraMove = true;
                } else if (b === 'SHIELD') {
                    this.addLog("BUFF: Shield Gained!");
                    this.selected.shield = true;
                } else {
                    this.addLog("BUFF: Warp Crystal!");
                    this.isWarp = true;
                }
                this.completeMove();
            }

            completeMove(failed = false) {
                const m = this.pendingMove;
                const p = m.pawn;
                if (!failed) { 
                    p.node = m.to; 
                    this.checkCaptures(m.to, p); 
                    this.spawnDust(this.nodes[m.to].x, this.nodes[m.to].y);
                }
                else { 
                    // Movement already updated by handleDebuffPenalty
                    p.node = m.to;
                    p.boost = 0; // Lost speed boost
                }

                // Amazon Power: If survived debuff (failure) or landed on danger zone, gain boost
                // But specifically for landing on it:
                if (!failed && m.to.includes('AMZ') && this.nodes[m.to].type === 'DEBUFF') {
                    p.boost = 2;
                    this.addLog("Amazon Survival: Speed Boost +2!");
                } else {
                    p.boost = 0;
                }

                const hasExtra = p.extraMove;
                p.extraMove = false;
                this.pendingMove = null;
                
                if (hasExtra && !failed) {
                    this.state = 'ROLL';
                    this.selected = null;
                    this.dests = [];
                    this.refresh();
                } else {
                    this.endTurn();
                }
            }

            checkCaptures(id, p) {
                // Caatinga Power: Immunity to capture while inside Caatinga paths
                if (id.includes('CAA')) {
                    this.addLog("Caatinga Power: Hidden from enemies!");
                    return;
                }

                const rivals = this.pawns.filter(x => x.node === id && x.side !== p.side);
                if (rivals.length > 0 && id !== 'START') {
                    // Check if rival has shield
                    const protectedRival = rivals.find(r => r.shield);
                    if (protectedRival) {
                        protectedRival.shield = false;
                        this.addLog("Rival shield blocked capture!");
                    } else {
                        this.pawns = this.pawns.filter(x => !rivals.includes(x));
                        this.addLog(`Captured ${rivals.length} opponent(s)!`);
                    }
                }
            }

            endTurn() {
                this.turn = this.turn === 'INVADER' ? 'GUARD' : 'INVADER';
                this.state = 'ROLL'; this.selected = null; this.dests = [];
                this.refresh(); this.checkWin();
            }

            refresh() {
                document.getElementById('roll-btn').disabled = (this.state !== 'ROLL');
                const turnEl = document.getElementById('stat-turn');
                turnEl.innerText = this.turn === 'INVADER' ? 'TURN: INVADERS' : 'TURN: GUARDIANS';
                turnEl.style.color = this.turn === 'INVADER' ? 'var(--invader)' : 'var(--guardian)';
                const hint = document.getElementById('game-hint');
                hint.innerText = this.state === 'ROLL' ? "ROLL THE DICE!" : (this.state === 'PICK' ? "CHOOSE YOUR PAWN!" : "CHOOSE YOUR DESTINATION!");
                document.querySelectorAll('.node-tile, .node-biome, .node-start').forEach(el => el.classList.remove('target-active'));
                this.dests.forEach(id => document.getElementById(`tile-${id}`)?.classList.add('target-active'));
                this.drawPawns();
            }

            addLog(msg) {
                const log = document.getElementById('log');
                const div = document.createElement('div'); div.style.padding = '8px 0';
                div.style.borderBottom = '1px solid #222'; div.innerText = `> ${msg}`;
                log.prepend(div);
            }

            checkWin() {
                const guards = this.pawns.filter(x => x.side === 'GUARD').length;
                const invaders = this.pawns.filter(x => x.side === 'INVADER').length;
                if (invaders === 0 || guards === 0) {
                    this.showWin(invaders === 0 ? "GUARDIANS WON!" : "INVADERS WON!");
                }
            }

            showWin(txt) {
                document.getElementById('win-txt').innerText = txt;
                document.getElementById('win-modal').style.display = 'flex';
                this.spawnConfetti();
                setInterval(() => this.spawnConfetti(), 3000);
            }

            spawnDust(x, y) {
                const board = document.getElementById('board-viewer');
                for (let i = 0; i < 8; i++) {
                    const d = document.createElement('div');
                    d.className = 'dust-particle';
                    d.style.left = (x / 1024 * board.offsetWidth) + 'px';
                    d.style.top = (y / 1024 * board.offsetHeight) + 'px';
                    const dx = (Math.random() - 0.5) * 100;
                    const dy = (Math.random() - 0.5) * 100;
                    d.style.setProperty('--dx', dx + 'px');
                    d.style.setProperty('--dy', dy + 'px');
                    d.style.animation = 'dustAnim 0.6s ease-out forwards';
                    board.appendChild(d);
                    setTimeout(() => d.remove(), 600);
                }
            }

            spawnConfetti() {
                const modal = document.getElementById('win-modal');
                const colors = ['#f1c40f', '#e74c3c', '#2ecc71', '#3498db', '#9b59b6'];
                for (let i = 0; i < 100; i++) {
                    const c = document.createElement('div');
                    c.className = 'confetti-particle';
                    c.style.left = Math.random() * 100 + '%';
                    c.style.top = '-10%';
                    c.style.background = colors[Math.floor(Math.random() * colors.length)];
                    const duration = Math.random() * 3 + 2;
                    c.style.transition = `all ${duration}s ease-in`;
                    modal.appendChild(c);
                    setTimeout(() => {
                        c.style.top = '110%';
                        c.style.left = (parseFloat(c.style.left) + (Math.random() - 0.5) * 20) + '%';
                    }, 10);
                    setTimeout(() => c.remove(), duration * 1000);
                }
            }
        }
        window.onload = () => new JogoEngine();
    </script>
</body>
</html>
