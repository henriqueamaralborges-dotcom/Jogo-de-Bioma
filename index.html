<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomas em Guerra: Tabuleiro de Trilha Real</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --board-color: #2c3e50;
            --path-active: #f1c40f;
            --forest-side: #27ae60;
            --invader-side: #c0392b;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #111;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        header {
            height: 80px;
            background: #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 3px solid #333;
        }
        .header-title { font-family: 'Fredoka One', cursive; font-size: 2rem; color: #fff; letter-spacing: 2px; }

        #main-container {
            display: flex;
            flex: 1;
            background: #151a20;
        }

        #board-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #2d3436 0%, #000 100%);
        }

        #svg-board {
            width: 90vmin;
            height: 90vmin;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,1));
        }

        /* UI Sidebar */
        #sidebar {
            width: 320px;
            background: #1e272e;
            border-left: 2px solid #3d3d3d;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .dice-box {
            background: #2f3542;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 2px solid #57606f;
        }
        #dice-result {
            font-family: 'Fredoka One';
            font-size: 4rem;
            margin: 10px 0;
            color: #f1c40f;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .rolling-anim { animation: roll-jump 0.15s infinite alternate; }
        @keyframes roll-jump { from { transform: scale(1); } to { transform: scale(1.1) rotate(10deg); } }

        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            transition: 0.2s;
            box-shadow: 0 5px 0 #ccc;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #ccc; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #ccc; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        #game-log {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
            font-size: 0.9rem;
            border: 1px solid #333;
        }
        .log-entry { margin-bottom: 8px; color: #ccc; }

        .hint { font-size: 0.8rem; color: #f1c40f; text-align: center; font-weight: 900; }

        /* SVG Components */
        .slot { cursor: pointer; transition: 0.2s; }
        .slot:hover circle { fill: #444; }
        .slot-dot { fill: #222; stroke: #555; stroke-width: 2; }
        .slot-highlight { stroke: #fff; stroke-width: 4; stroke-dasharray: 5 3; animation: dash 2s linear infinite; }
        @keyframes dash { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 20; } }

        /* PAWN (Piao) shape */
        .pawn { cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .pawn:hover { transform: scale(1.2) translateY(-10px); }
        .pawn-selected { filter: drop-shadow(0 0 20px #fff); transform: scale(1.3) translateY(-15px); }
        
        #victory-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">BIOMAS EM GUERRA</div>
        <div id="turn-status" style="color:var(--forest-side); font-weight: 900; font-size: 1.2rem;">TURNO: NATUREZA</div>
    </header>

    <div id="main-container">
        <div id="board-wrapper">
            <svg id="svg-board" viewBox="0 0 1000 1000">
                <!-- Board Texture -->
                <circle cx="500" cy="500" r="480" fill="#2c3e50" stroke="#1a1a1a" stroke-width="20" />
                <path d="M500,500 L500,20" stroke="#1a1a1a" stroke-width="2" opacity="0.1" />

                <g id="paths-layer"></g>
                <g id="slots-layer"></g>
                <g id="pawns-layer"></g>
            </svg>
        </div>

        <div id="sidebar">
            <div class="dice-box">
                <div id="dice-result">?</div>
                <button class="btn" id="roll-btn">ROLAR DADO</button>
                <p id="action-hint" class="hint" style="margin-top: 15px;">ROLE O DADO</p>
            </div>

            <div id="game-log"></div>
        </div>
    </div>

    <div id="victory-overlay">
        <div style="text-align: center;">
            <h1 id="victory-txt" style="font-size: 4rem; color: #fff;">VOCÊ VENCEU!</h1>
            <button class="btn" style="width: auto; padding: 20px 50px; margin-top: 30px;" onclick="location.reload()">NOVA PARTIDA</button>
        </div>
    </div>

    <script>
        const BIOMES = [
            { id: 'AMZ', n: 'Amazônia', c: '#27ae60', a: -90 },
            { id: 'CER', n: 'Cerrado', c: '#f39c12', a: -30 },
            { id: 'CAA', n: 'Caatinga', c: '#d35400', a: 30 },
            { id: 'MAT', n: 'Mata Atlântica', c: '#2ecc71', a: 90 },
            { id: 'COS', n: 'Costão', c: '#3498db', a: 150 },
            { id: 'PAN', n: 'Pantanal', c: '#2980b9', a: 210 }
        ];

        class JogoDePiao {
            constructor() {
                this.turn = 'BIOMES'; // BIOMES or INVADER
                this.dice = 0;
                this.state = 'ROLL'; // ROLL, PAWN, SLOT
                this.slots = {};
                this.pawns = [];
                this.selectedPawn = null;
                this.validDests = [];

                this.setupBoard();
                this.setupPawns();
                this.bind();
            }

            setupBoard() {
                // 1. Central Home
                this.slots['CENTER'] = { id: 'CENTER', x: 500, y: 500, t: 'HOME', links: [] };

                // 2. Radial Paths (Tracks)
                BIOMES.forEach(b => {
                    const steps = 4;
                    const radius = 420;
                    let lastId = 'CENTER';

                    for (let i = 1; i <= steps; i++) {
                        const dist = (radius / (steps + 1)) * i;
                        const x = 500 + dist * Math.cos(b.a * Math.PI / 180);
                        const y = 500 + dist * Math.sin(b.a * Math.PI / 180);
                        const id = `r-${b.id}-${i}`;
                        this.slots[id] = { id, x, y, t: 'DASH', links: [lastId] };
                        this.slots[lastId].links.push(id);
                        lastId = id;
                    }

                    // Biome Base (End of radial)
                    const bx = 500 + radius * Math.cos(b.a * Math.PI / 180);
                    const by = 500 + radius * Math.sin(b.a * Math.PI / 180);
                    this.slots[b.id] = { id: b.id, x: bx, y: by, t: 'BASE', n: b.n, c: b.c, links: [lastId] };
                    this.slots[lastId].links.push(b.id);
                });

                // 3. Circular Paths (Between biomes)
                BIOMES.forEach((b, i) => {
                    const next = BIOMES[(i + 1) % 6];
                    const steps = 6;
                    let lastId = b.id;
                    for (let j = 1; j <= steps; j++) {
                        const t = j / (steps + 1);
                        const startA = b.a * Math.PI / 180;
                        const endA = (i === 5 ? 270 : next.a) * Math.PI / 180;
                        const currA = startA + (endA - startA) * t;
                        const dist = 420;
                        const x = 500 + dist * Math.cos(currA);
                        const y = 500 + dist * Math.sin(currA);
                        const id = `c-${b.id}-${next.id}-${j}`;
                        this.slots[id] = { id, x, y, t: 'DASH', links: [lastId] };
                        this.slots[lastId].links.push(id);
                        lastId = id;
                    }
                    this.slots[lastId].links.push(next.id);
                    this.slots[next.id].links.push(lastId);
                });

                this.renderSlots();
            }

            setupPawns() {
                // Biomes start at their bases
                BIOMES.forEach(b => {
                    this.pawns.push({ id: `p-${b.id}`, side: 'BIOMES', slot: b.id, color: b.c, icon: '🌳' });
                });
                // 3 Invasores start at Center
                for (let i = 0; i < 3; i++) {
                    this.pawns.push({ id: `i-${i}`, side: 'INVADER', slot: 'CENTER', color: '#c0392b', icon: '💀' });
                }
                this.renderPawns();
            }

            renderSlots() {
                const layer = document.getElementById('slots-layer');
                const paths = document.getElementById('paths-layer');
                
                Object.values(this.slots).forEach(s => {
                    // Links
                    s.links.forEach(lid => {
                        const l = this.slots[lid];
                        if (lid > s.id) {
                            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', s.x); line.setAttribute('y1', s.y);
                            line.setAttribute('x2', l.x); line.setAttribute('y2', l.y);
                            line.setAttribute('stroke', '#3d4b5a'); line.setAttribute('stroke-width', '4');
                            paths.appendChild(line);
                        }
                    });

                    // Slot
                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.setAttribute('class', 'slot');
                    g.onclick = () => this.onSlotClick(s.id);

                    const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circ.setAttribute('cx', s.x); circ.setAttribute('cy', s.y);
                    circ.setAttribute('r', s.t === 'HOME' ? '60' : (s.t === 'BASE' ? '40' : '15'));
                    circ.setAttribute('fill', s.t === 'HOME' ? '#000' : '#1e272e');
                    circ.setAttribute('stroke', s.c || '#57606f');
                    circ.setAttribute('stroke-width', '4');
                    circ.id = `slot-circ-${s.id}`;
                    g.appendChild(circ);

                    if (s.t === 'BASE') {
                        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        txt.setAttribute('x', s.x); txt.setAttribute('y', s.y + 60);
                        txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('fill', s.c);
                        txt.setAttribute('font-weight', '900'); txt.setAttribute('font-size', '14');
                        txt.textContent = s.n.toUpperCase();
                        g.appendChild(txt);
                    }

                    layer.appendChild(g);
                });
            }

            renderPawns() {
                const layer = document.getElementById('pawns-layer');
                layer.innerHTML = '';
                
                const grouped = {};
                this.pawns.forEach(p => {
                    if (!grouped[p.slot]) grouped[p.slot] = [];
                    grouped[p.slot].push(p);
                });

                Object.entries(grouped).forEach(([sid, ps]) => {
                    const slot = this.slots[sid];
                    ps.forEach((p, i) => {
                        const offset = (i - (ps.length-1)/2) * 35;
                        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        g.setAttribute('class', `pawn ${this.selectedPawn === p ? 'pawn-selected' : ''}`);
                        g.onclick = (e) => { e.stopPropagation(); this.onPawnClick(p); };
                        
                        // Draw a conical "PIÃO" shape
                        const shape = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        // a nice pawn silouette
                        shape.setAttribute('d', `M-15,15 L15,15 L10,-5 C10,-15 0,-25 0,-25 C0,-25 -10,-15 -10,-5 Z`);
                        shape.setAttribute('fill', p.color);
                        shape.setAttribute('stroke', '#fff');
                        shape.setAttribute('stroke-width', '2');
                        shape.setAttribute('transform', `translate(${slot.x + offset}, ${slot.y + 10})`);
                        g.appendChild(shape);

                        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        txt.setAttribute('x', slot.x + offset); txt.setAttribute('y', slot.y - 12);
                        txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('fill', '#fff');
                        txt.setAttribute('font-size', '18'); txt.textContent = p.icon;
                        txt.style.pointerEvents = 'none';
                        g.appendChild(txt);

                        layer.appendChild(g);
                    });
                });
            }

            bind() {
                document.getElementById('roll-btn').onclick = () => this.roll();
            }

            async roll() {
                if (this.state !== 'ROLL') return;
                const res = document.getElementById('dice-result');
                res.classList.add('rolling-anim');
                
                // Anim
                for(let i=0; i<12; i++) {
                    res.innerText = Math.floor(Math.random()*6)+1;
                    await new Promise(r => setTimeout(r, 70));
                }

                this.dice = Math.floor(Math.random() * 6) + 1;
                res.classList.remove('rolling-anim');
                res.innerText = this.dice;
                
                this.state = 'PAWN';
                document.getElementById('roll-btn').disabled = true;
                this.hint(`SELECIONE UM PIÃO PARA ANDAR ${this.dice} CASAS`);
            }

            onPawnClick(p) {
                if (this.state !== 'PAWN' || p.side !== this.turn) return;
                this.selectedPawn = p;
                this.calculateMoves(p.slot, this.dice);
                
                if (this.validDests.length === 0) {
                    this.log("Sem movimentos possíveis para este pião!", 'system');
                    this.selectedPawn = null;
                    return;
                }
                
                this.state = 'SLOT';
                this.renderPawns();
                this.highlightDests();
                this.hint("CLIQUE NO DESTINO (BRANCO)");
            }

            calculateMoves(start, steps) {
                this.validDests = [];
                let queue = [{ id: start, d: 0 }];
                let seen = new Set();
                
                while(queue.length > 0) {
                    let { id, d } = queue.shift();
                    if (d === steps) {
                        if (id !== start) this.validDests.push(id);
                        continue;
                    }
                    this.slots[id].links.forEach(next => {
                        queue.push({ id: next, d: d + 1 });
                    });
                }
                this.validDests = [...new Set(this.validDests)];
            }

            highlightDests() {
                document.querySelectorAll('.slot-highlight').forEach(el => el.classList.remove('slot-highlight'));
                this.validDests.forEach(vid => {
                    document.getElementById(`slot-circ-${vid}`).classList.add('slot-highlight');
                });
            }

            onSlotClick(sid) {
                if (this.state !== 'SLOT' || !this.validDests.includes(sid)) return;
                
                const p = this.selectedPawn;
                p.slot = sid;
                
                // Eat rival
                const rivals = this.pawns.filter(x => x.slot === sid && x.side !== p.side);
                if (rivals.length > 0) {
                    this.log(`${p.side} capturou um rival em ${sid}!`, 'system');
                    this.pawns = this.pawns.filter(x => x !== rivals[0]);
                }

                this.log(`${this.turn} moveu para ${sid}`, this.turn.toLowerCase());
                this.endTurn();
            }

            endTurn() {
                this.turn = this.turn === 'BIOMES' ? 'INVADER' : 'BIOMES';
                this.state = 'ROLL';
                this.selectedPawn = null;
                this.validDests = [];
                
                document.getElementById('roll-btn').disabled = false;
                document.getElementById('turn-status').innerText = `TURNO: ${this.turn === 'BIOMES' ? 'NATUREZA' : 'INVASORES'}`;
                document.getElementById('turn-status').style.color = this.turn === 'BIOMES' ? 'var(--forest-side)' : 'var(--invader-side)';
                
                document.querySelectorAll('.slot-highlight').forEach(el => el.classList.remove('slot-highlight'));
                this.renderPawns();
                this.hint("ROLE O DADO");
                this.checkWin();
            }

            hint(m) { document.getElementById('action-hint').innerText = m; }

            log(m, c) {
                const log = document.getElementById('game-log');
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.innerText = `> ${m}`;
                log.prepend(div);
            }

            checkWin() {
                const b = this.pawns.filter(x => x.side === 'BIOMES').length;
                const i = this.pawns.filter(x => x.side === 'INVADER').length;
                if (i === 0) this.win("NATUREZA VENCEU!");
                else if (b === 0) this.win("INVASORES VENCERAM!");
            }

            win(t) {
                document.getElementById('victory-txt').innerText = t;
                document.getElementById('victory-overlay').style.display = 'flex';
            }
        }

        const jogo = new JogoDePiao();
    </script>
</body>
</html>
