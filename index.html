<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomes at War: Map Trail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --guardian: #2ecc71;
            --invader: #e74c3c;
            --highlight: #f1c40f;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            background: #000; 
            font-family: 'Outfit', sans-serif; 
            height: 100vh; 
            display: grid;
            grid-template-areas: "header header" "board sidebar";
            grid-template-columns: 1fr 380px;
            grid-template-rows: 80px 1fr;
            overflow: hidden;
            color: #fff;
        }

        header {
            grid-area: header;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 2px solid #333;
            z-index: 100;
        }
        .logo { font-family: 'Fredoka One'; font-size: 2rem; }

        #board-viewer {
            grid-area: board;
            position: relative;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #game-svg { width: 100%; height: 100%; }

        #sidebar {
            grid-area: sidebar;
            background: #121420;
            border-left: 2px solid #000;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .ui-box { background: #000; border-radius: 15px; padding: 25px; border: 2px solid #333; text-align: center; }
        #dice-view { font-size: 5rem; margin-bottom: 5px; font-family: 'Fredoka One'; color: var(--highlight); }
        
        .btn { 
            width: 100%; padding: 20px; border-radius: 15px; border: none; 
            font-family: 'Fredoka One'; font-size: 1.3rem; cursor: pointer; transition: 0.2s;
            background: #fff; color: #000; box-shadow: 0 6px 0 #999;
        }
        .btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 9px 0 #999; }
        .btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 #999; }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }

        .hint { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 2px solid var(--highlight); color: var(--highlight); font-weight: 900; text-align: center; text-transform: uppercase; font-size: 0.9rem; }

        #log { flex: 1; background: #000; border-radius: 12px; padding: 15px; overflow-y: auto; font-size: 0.82rem; color: #888; border: 1px solid #222; }

        /* Game tiles (visible over the map) */
        .node-tile {
            fill: rgba(255,255,255,0.2);
            stroke: rgba(255,255,255,0.5);
            stroke-width: 2;
            cursor: pointer;
            transition: all 0.2s;
        }
        .node-tile:hover {
            fill: rgba(255,255,255,0.4);
            stroke: #fff;
            stroke-width: 3;
        }
        .node-biome {
            fill: rgba(255,255,255,0.1);
            stroke: rgba(255,255,255,0.6);
            stroke-width: 3;
            cursor: pointer;
        }
        .node-start {
            fill: rgba(255,255,255,0.05);
            stroke: rgba(255,255,255,0.3);
            stroke-width: 2;
            cursor: pointer;
        }
        .debuff-tile {
            fill: rgba(255,50,50,0.3) !important;
            stroke: rgba(255,50,50,0.7) !important;
            stroke-width: 3 !important;
        }

        .target-active { 
            stroke: #fff !important; stroke-width: 8 !important; 
            stroke-dasharray: 10 5; animation: dashAnim 3s linear infinite; 
            fill: rgba(255,255,255,0.5) !important;
        }
        @keyframes dashAnim { from { stroke-dashoffset: 60; } to { stroke-dashoffset: 0; } }

        /* Pawns */
        .pawn-g { transition: transform 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); pointer-events: all; }
        .pawn-visual { filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8)); cursor: pointer; }
        .pawn-jumping { animation: pawnHop 0.7s infinite alternate ease-in-out; }
        @keyframes pawnHop { from { transform: translateY(0); } to { transform: translateY(-20px); } }
        .pawn-selected { filter: drop-shadow(0 0 25px #fff); transform: translateY(-30px) scale(1.4); }

        #win-modal { position: fixed; inset: 0; background: rgba(0,0,0,1); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        #debuff-alert { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); background: #ff0000; color: #fff; padding: 10px 20px; border-radius: 10px; font-weight: 900; display: none; animation: pop 0.5s; z-index: 2000; font-family: 'Fredoka One'; }
        @keyframes pop { 0% { transform: translate(-50%, -20px) scale(0); } 100% { transform: translate(-50%, 0) scale(1); } }
    </style>
</head>
<body>
    <header>
        <div class="logo">BIOMES AT WAR</div>
        <div id="stat-turn" style="color:var(--invader); font-weight: 900; font-size: 1.5rem;">TURN: INVADERS</div>
    </header>

    <div id="board-viewer">
        <div id="debuff-alert">⚠️ DEBUFF! RETURN TO PREVIOUS TILE!</div>
        <svg id="game-svg" viewBox="0 0 1024 1024" preserveAspectRatio="xMidYMid meet">
            <image href="mapa.png" x="0" y="0" width="1024" height="1024" />
            <g id="lay-nodes"></g> 
            <g id="lay-pawns"></g>
        </svg>
    </div>

    <div id="sidebar">
        <div class="ui-box">
            <div id="dice-view">🎲</div>
            <button class="btn" id="roll-btn">ROLL DICE</button>
        </div>
        <div id="game-hint" class="hint">ROLL THE DICE</div>
        <div id="log"></div>
    </div>

    <div id="win-modal">
        <h1 id="win-txt" style="font-family: Fredoka One; font-size: 5rem; color: #fff; margin-bottom: 20px;">WON!</h1>
        <button class="btn" style="width: auto; padding: 25px 60px;" onclick="location.reload()">NEW GAME</button>
    </div>

    <script>
        // =========================================================
        // MANUAL COORDINATES - PIXEL BY PIXEL WITH THE 1024x1024 MAP
        // Now viewBox = 0 0 1024 1024 = coordinates = PNG pixels
        // =========================================================

        const CX = 510, CY = 500; // Center "Start" of the map

        const BIOMAS = [
            { id: 'CAA', n: 'Caatinga',       x: 170, y:  55 },
            { id: 'PAN', n: 'Pantanal',        x: 755, y:  95 },
            { id: 'CER', n: 'Cerrado',         x: 930, y: 480 },
            { id: 'AMZ', n: 'Amazon',          x: 800, y: 880 },
            { id: 'MAT', n: 'Atlantic Forest', x: 255, y: 895 },
            { id: 'COS', n: 'Rocky Coast',     x:  80, y: 490 }
        ];

        // Radial trail: each sub-array = [x, y] of each brown tile
        // from the center (Start) to the biome
        const RADS = {
            'CAA': [
                [478,460],[450,415],[425,370],[398,325],[370,280],[340,235],[308,188],[268,145],[218,100]
            ],
            'PAN': [
                [545,465],[575,425],[608,385],[640,345],[670,305],[700,262],[722,220],[740,175],[748,132]
            ],
            'CER': [
                [560,495],[610,492],[660,490],[710,488],[758,486],[808,484],[858,482],[900,480]
            ],
            'AMZ': [
                [545,540],[570,585],[598,630],[625,675],[655,718],[690,760],[722,800],[760,842],[785,878]
            ],
            'MAT': [
                [478,542],[448,588],[420,632],[392,678],[365,722],[338,768],[310,812],[280,855],[260,892]
            ],
            'COS': [
                [462,498],[415,496],[368,494],[320,492],[272,490],[225,488],[178,486],[128,488]
            ]
        };

        // Outer circular ring: tiles between each pair of biomes
        const RING = {
            'CAA-PAN': [
                [222,62],[278,48],[338,38],[398,35],[458,35],[518,40],[578,50],[638,62],[698,80]
            ],
            'PAN-CER': [
                [790,135],[815,180],[838,228],[858,278],[875,328],[890,378],[900,428],[918,460]
            ],
            'CER-AMZ': [
                [935,525],[930,575],[920,628],[905,680],[888,730],[868,778],[845,822],[820,858]
            ],
            'AMZ-MAT': [
                [755,912],[700,932],[645,948],[590,955],[535,955],[480,948],[425,938],[370,922],[315,905]
            ],
            'MAT-COS': [
                [215,875],[182,838],[155,795],[135,748],[118,698],[105,648],[95,598],[88,548],[82,510]
            ],
            'COS-CAA': [
                [78,455],[82,405],[90,355],[102,305],[118,258],[138,212],[158,168],[175,125],[172,82]
            ]
        };

        // Which indices (0-based) in the circular ring are DEBUFF (red tiles)
        const DEBUFF_AT = [2, 5, 7];

        class JogoEngine {
            constructor() {
                this.turn = 'INVADER';
                this.dice = 0;
                this.state = 'ROLL';
                this.nodes = {};
                this.pawns = [];
                this.selected = null;
                this.dests = [];

                this.buildGraph();
                this.buildPawns();
                this.bindUI();
                this.refresh();
            }

            buildGraph() {
                this.addN('START', CX, CY, 'START');

                // Radiais
                BIOMAS.forEach(b => {
                    const pts = RADS[b.id];
                    let prev = 'START';
                    pts.forEach((p, i) => {
                        const id = `r-${b.id}-${i}`;
                        this.addN(id, p[0], p[1], 'STEP');
                        this.linkN(prev, id);
                        prev = id;
                    });
                    this.addN(b.id, b.x, b.y, 'BIOME');
                    this.linkN(prev, b.id);
                });

                // Anel circular
                Object.keys(RING).forEach(key => {
                    const [from, to] = key.split('-');
                    const pts = RING[key];
                    let prev = from;
                    pts.forEach((p, j) => {
                        const id = `c-${key}-${j}`;
                        const type = DEBUFF_AT.includes(j) ? 'DEBUFF' : 'STEP';
                        this.addN(id, p[0], p[1], type);
                        this.linkN(prev, id);
                        prev = id;
                    });
                    this.linkN(prev, to);
                });

                this.drawNodes();
            }

            addN(id, x, y, type) { this.nodes[id] = { id, x, y, type, links: [] }; }
            linkN(a, b) { this.nodes[a].links.push(b); this.nodes[b].links.push(a); }

            buildPawns() {
                for (let i = 1; i <= 3; i++) {
                    this.pawns.push({ id: `inv${i}`, side: 'INVADER', node: 'START', color: '#ff3333', icon: '👹' });
                    this.pawns.push({ id: `grd${i}`, side: 'GUARD', node: 'START', color: '#27ae60', icon: '🛡️' });
                }
                this.drawPawns();
            }

            drawNodes() {
                const layer = document.getElementById('lay-nodes');
                Object.values(this.nodes).forEach(n => {
                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.addEventListener('click', () => this.onNodeClick(n.id));
                    
                    if (n.type === 'STEP' || n.type === 'DEBUFF') {
                        const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        const s = 32; // tile size
                        r.setAttribute('x', n.x - s/2);
                        r.setAttribute('y', n.y - s/2);
                        r.setAttribute('width', s);
                        r.setAttribute('height', s);
                        r.setAttribute('rx', 5);
                        r.setAttribute('class', 'node-tile');
                        r.setAttribute('id', `tile-${n.id}`);
                        if (n.type === 'DEBUFF') r.classList.add('debuff-tile');
                        g.appendChild(r);
                    } else {
                        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        c.setAttribute('cx', n.x);
                        c.setAttribute('cy', n.y);
                        c.setAttribute('r', n.type === 'START' ? 70 : 45);
                        c.setAttribute('class', n.type === 'START' ? 'node-start' : 'node-biome');
                        c.setAttribute('id', `tile-${n.id}`);
                        g.appendChild(c);
                    }
                    layer.appendChild(g);
                });
            }

            drawPawns() {
                const layer = document.getElementById('lay-pawns');
                layer.innerHTML = '';
                const groups = {};
                this.pawns.forEach(p => { groups[p.node] = groups[p.node] || []; groups[p.node].push(p); });

                Object.entries(groups).forEach(([nid, ps]) => {
                    const n = this.nodes[nid];
                    ps.forEach((p, idx) => {
                        const cols = Math.min(ps.length, 3);
                        const row = Math.floor(idx / cols);
                        const col = idx % cols;
                        const ox = (col - (cols-1)/2) * 32;
                        const oy = row * 35;
                        
                        const mg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        mg.setAttribute('transform', `translate(${n.x + ox}, ${n.y + oy - 10})`);
                        mg.setAttribute('class', 'pawn-g');

                        const body = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        body.setAttribute('d', 'M-18,22 L18,22 L15,-10 C12,-25 0,-38 0,-38 C0,-38 -12,-25 -15,-10 Z');
                        body.setAttribute('fill', p.color);
                        body.setAttribute('stroke', '#fff');
                        body.setAttribute('stroke-width', '2.5');
                        body.setAttribute('class', 'pawn-visual');

                        if (this.selected === p) body.classList.add('pawn-selected');
                        if (this.state === 'PICK' && p.side === this.turn) body.classList.add('pawn-jumping');

                        if (this.state === 'MOVE') {
                            mg.style.pointerEvents = 'none';
                        } else {
                            mg.style.pointerEvents = 'all';
                            mg.addEventListener('click', (e) => { e.stopPropagation(); this.onPawnClick(p); });
                        }

                        const icon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        icon.setAttribute('y', -18);
                        icon.setAttribute('text-anchor', 'middle');
                        icon.setAttribute('font-size', '18');
                        icon.textContent = p.icon;

                        mg.appendChild(body);
                        mg.appendChild(icon);
                        layer.appendChild(mg);
                    });
                });
            }

            bindUI() {
                document.getElementById('roll-btn').onclick = () => this.rollDice();
            }

            async rollDice() {
                if (this.state !== 'ROLL') return;
                const dv = document.getElementById('dice-view');
                const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
                for (let i = 0; i < 12; i++) {
                    dv.innerText = faces[Math.floor(Math.random() * 6)];
                    await new Promise(r => setTimeout(r, 70));
                }
                this.dice = Math.floor(Math.random() * 6) + 1;
                dv.innerText = faces[this.dice - 1];
                this.state = 'PICK';
                this.refresh();
            }

            onPawnClick(p) {
                if (this.state !== 'PICK' || p.side !== this.turn) return;
                this.selected = p;
                this.findDests(p.node, this.dice);
                if (this.dests.length === 0) { this.endTurn(); return; }
                this.state = 'MOVE';
                this.refresh();
            }

            findDests(start, dist) {
                this.dests = [];
                const q = [{ id: start, d: 0, path: [start] }];
                const found = new Set();
                while (q.length > 0) {
                    const { id, d, path } = q.shift();
                    if (d === dist) { found.add(id); continue; }
                    this.nodes[id].links.forEach(next => {
                        if (path.length < 2 || next !== path[path.length - 2]) {
                            q.push({ id: next, d: d + 1, path: [...path, next] });
                        }
                    });
                }
                this.dests = Array.from(found).filter(x => x !== start);
            }

            onNodeClick(id) {
                if (this.state !== 'MOVE' || !this.dests.includes(id)) return;
                const p = this.selected;
                const old = p.node;
                p.node = id;

                // Debuff: return to previous location
                if (this.nodes[id].type === 'DEBUFF') {
                    const alert = document.getElementById('debuff-alert');
                    alert.style.display = 'block';
                    setTimeout(() => {
                        alert.style.display = 'none';
                        p.node = old;
                        this.drawPawns();
                    }, 1500);
                }

                // Capture rival if on the same tile
                const rival = this.pawns.find(x => x.node === id && x.side !== p.side && x !== p);
                if (rival && id !== 'START') {
                    this.pawns = this.pawns.filter(x => x !== rival);
                    this.addLog('Captured an opponent!');
                }

                this.endTurn();
            }

            endTurn() {
                this.turn = this.turn === 'INVADER' ? 'GUARD' : 'INVADER';
                this.state = 'ROLL';
                this.selected = null;
                this.dests = [];
                this.refresh();
                this.checkWin();
            }

            refresh() {
                document.getElementById('roll-btn').disabled = (this.state !== 'ROLL');

                const turnEl = document.getElementById('stat-turn');
                turnEl.innerText = this.turn === 'INVADER' ? 'TURN: INVADERS' : 'TURN: GUARDIANS';
                turnEl.style.color = this.turn === 'INVADER' ? 'var(--invader)' : 'var(--guardian)';

                const hint = document.getElementById('game-hint');
                if (this.state === 'ROLL') hint.innerText = "ROLL THE DICE";
                else if (this.state === 'PICK') hint.innerText = "CLICK ON THE JUMPING PAWN";
                else hint.innerText = "CLICK ON THE GLOWING TILE";

                // Highlight destinations
                document.querySelectorAll('.node-tile, .node-biome, .node-start').forEach(el => el.classList.remove('target-active'));
                this.dests.forEach(id => {
                    const el = document.getElementById(`tile-${id}`);
                    if (el) el.classList.add('target-active');
                });

                this.drawPawns();
            }

            addLog(msg) {
                const log = document.getElementById('log');
                const div = document.createElement('div');
                div.style.padding = '4px 0';
                div.style.color = '#78e08f';
                div.innerText = `> ${msg}`;
                log.prepend(div);
            }

            checkWin() {
                const guards = this.pawns.filter(x => x.side === 'GUARD').length;
                const invaders = this.pawns.filter(x => x.side === 'INVADER').length;
                if (invaders === 0) this.showWin("GUARDIANS WON!");
                if (guards === 0) this.showWin("INVADERS WON!");
            }

            showWin(txt) {
                document.getElementById('win-txt').innerText = txt;
                document.getElementById('win-modal').style.display = 'flex';
            }
        }

        window.onload = () => new JogoEngine();
    </script>
</body>
</html>
