<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomas em Guerra: A Grande Uni├гo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --guardian: #2ecc71;
            --invader: #e74c3c;
            --ocean: #4fa1c1;
            --land: #dcbc8a; /* Beige do mapa */
            --path: #8b5a2b;
            --highlight: #f1c40f;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            background: #111; 
            font-family: 'Outfit', sans-serif; 
            height: 100vh; 
            display: grid;
            grid-template-areas: "header header" "board sidebar";
            grid-template-columns: 1fr 350px;
            grid-template-rows: 80px 1fr;
            overflow: hidden;
            color: #fff;
        }

        header {
            grid-area: header;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 4px solid var(--path);
            z-index: 100;
        }
        .logo { font-family: 'Fredoka One'; font-size: 2.2rem; color: #fff; text-shadow: 2px 2px 0 #333; }

        #board-viewer {
            grid-area: board;
            position: relative;
            background: var(--ocean);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-svg { width: 95%; height: 95%; max-width: 85vh; }

        #sidebar {
            grid-area: sidebar;
            background: #1a1a1a;
            border-left: 4px solid var(--path);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            z-index: 50;
        }

        .panel { background: #000; border-radius: 15px; padding: 20px; border: 3px solid #333; text-align: center; }
        #dice-box { font-size: 5rem; margin-bottom: 5px; font-family: 'Fredoka One'; color: var(--highlight); }
        
        .btn { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; 
            font-family: 'Fredoka One'; font-size: 1.2rem; cursor: pointer; transition: 0.2s;
            background: #f1c40f; color: #000; box-shadow: 0 6px 0 #967117;
        }
        .btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 9px 0 #967117; }
        .btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 3px 0 #967117; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .hint { background: #000; padding: 12px; border-radius: 10px; border: 2px solid var(--highlight); color: var(--highlight); font-weight: 900; text-align: center; text-transform: uppercase; font-size: 0.8rem; }

        #game-log { flex: 1; background: #000; border-radius: 10px; padding: 12px; overflow-y: auto; font-size: 0.83rem; color: #bbb; border: 1px solid #333; }

        /* Tiles Estilo Arte Pixelada */
        .tile { stroke: #4e342e; stroke-width: 3; cursor: pointer; }
        .tile-step { fill: #dcbc8a; } /* Cor palha/beige */
        .tile-step:hover { fill: #f2e1c1; }
        
        .tile-base { stroke-width: 8; fill: #dcbc8a; }
        
        .label { font-family: 'Fredoka One'; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; paint-order: stroke; stroke: #000; stroke-width: 6px; stroke-linejoin: round; }

        .link-path { stroke: #4e342e; stroke-width: 20; stroke-linecap: butt; pointer-events: none; }
        
        .tile-active { 
            stroke: #fff !important; stroke-width: 12 !important; 
            stroke-dasharray: 12 6; animation: rotateOutline 3s linear infinite; 
            fill: rgba(255,255,255,0.4) !important;
        }
        @keyframes rotateOutline { from { stroke-dashoffset: 60; } to { stroke-dashoffset: 0; } }

        /* Pi├╡es */
        .pawn-g { transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1); pointer-events: all; }
        .pawn-jumping { animation: pawnHop 0.7s infinite alternate ease-in-out; }
        @keyframes pawnHop { from { transform: translateY(0); } to { transform: translateY(-25px); } }
        .pawn-selected { filter: drop-shadow(0 0 25px #fff); transform: translateY(-30px) scale(1.3); z-index: 1000; }

        #win-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
    </style>
</head>
<body>
    <header>
        <div class="logo">BIOMAS EM GUERRA</div>
        <div id="status-turn" style="color:var(--invader); font-weight: 900; font-size: 1.5rem;">TURNO: INVASORES</div>
    </header>

    <div id="board-viewer">
        <svg id="game-svg" viewBox="0 0 1000 1000">
            <!-- Camadas de Arte do Mapa (Desenhadas por C├│digo) -->
            <rect width="1000" height="1000" fill="var(--ocean)" />
            
            <!-- Biomas Ground (Decorative) -->
            <circle cx="500" cy="500" r="460" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="100" />
            
            <g id="lay-links"></g>
            <g id="lay-nodes"></g>
            <g id="lay-pawns"></g>
        </svg>
    </div>

    <div id="sidebar">
        <div class="panel">
            <div id="dice-box">ЁЯО▓</div>
            <button class="btn" id="roll-btn">ROLAR DADO</button>
        </div>

        <div id="game-hint" class="hint">ROLE O DADO</div>
        
        <div id="game-log"></div>
    </div>

    <div id="win-overlay">
        <h1 id="win-txt" style="font-family: Fredoka One; font-size: 5rem; color: #fff; margin-bottom: 20px;">VENCERAM!</h1>
        <button class="btn" style="width: auto; padding: 25px 60px;" onclick="location.reload()">NOVA PARTIDA</button>
    </div>

    <script>
        const CONFIG = [
            { id: 'AMZ', n: 'Amaz├┤nia', c: '#2ecc71', a: -90 },
            { id: 'CER', n: 'Cerrado', c: '#f1c40f', a: -30 },
            { id: 'CAA', n: 'Caatinga', c: '#e67e22', a: 30 },
            { id: 'MAT', n: 'Mata Atl├вntica', c: '#3498db', a: 90 },
            { id: 'COS', n: 'Cost├гo Rochoso', c: '#95a5a6', a: 150 },
            { id: 'PAN', n: 'Pantanal', c: '#9b59b6', a: 210 }
        ];

        class JogoEngine {
            constructor() {
                this.turn = 'INVADER'; 
                this.diceValue = 0;
                this.state = 'ROLL'; 
                this.nodes = {};
                this.pawns = [];
                this.selected = null;
                this.dests = [];

                this.initGraph();
                this.initPawns();
                this.bindAll();
                this.update();
            }

            initGraph() {
                // START (Centro em Beige)
                this.addNode('START', 485, 475, 'BASE_START', 'START', '#dcbc8a');

                CONFIG.forEach(b => {
                    let prev = 'START';
                    const radius = 380;
                    for (let i = 1; i <= 4; i++) {
                        const nid = `r-${b.id}-${i}`;
                        const d = (radius / 5) * i;
                        const x = 485 + d * Math.cos(b.a * Math.PI / 180);
                        const y = 475 + d * Math.sin(b.a * Math.PI / 180);
                        this.addNode(nid, x, y, 'STEP');
                        this.join(prev, nid);
                        prev = nid;
                    }
                    this.addNode(b.id, 485 + radius * Math.cos(b.a * Math.PI / 180), 485 + radius * Math.sin(b.a * Math.PI / 180), 'BIOME', b.n, b.c);
                    this.join(prev, b.id);
                });

                // Circular UNION (Trilha do mapa)
                CONFIG.forEach((b, i) => {
                    const next = CONFIG[(i + 1) % 6];
                    let prev = b.id;
                    const steps = 7; // Igual ao mapa das fotos
                    for (let j = 1; j <= steps; j++) {
                        const sid = `c-${b.id}-${next.id}-${j}`;
                        const startA = b.a;
                        const endA = (i === 5 ? (b.a + 120) : next.a);
                        const angle = (startA + (endA - startA) * (j / (steps + 1))) * Math.PI / 180;
                        const d = 380;
                        const x = 485 + d * Math.cos(angle);
                        const y = 475 + d * Math.sin(angle);
                        this.addNode(sid, x, y, 'STEP');
                        this.join(prev, sid);
                        prev = sid;
                    }
                    this.join(prev, next.id);
                });
                this.renderMap();
            }

            addNode(id, x, y, t, n = '', c = null) { this.nodes[id] = { id, x, y, t, n, c, links: [] }; }
            join(a, b) { this.nodes[a].links.push(b); this.nodes[b].links.push(a); }

            initPawns() {
                for (let i = 1; i <= 3; i++) {
                    this.pawns.push({ id: `i${i}`, side: 'INVADER', node: 'START', c: varVal('--invader'), i: 'ЁЯС║' });
                }
                CONFIG.forEach(b => {
                    this.pawns.push({ id: `g-${b.id}`, side: 'GUARD', node: b.id, c: b.c, i: 'ЁЯЫбя╕П' });
                });
                this.renderPawns();
            }

            renderMap() {
                const nodesL = document.getElementById('lay-nodes');
                const linksL = document.getElementById('lay-links');
                const seen = new Set();

                Object.values(this.nodes).forEach(n => {
                    n.links.forEach(lid => {
                        const key = [n.id, lid].sort().join(':');
                        if (!seen.has(key)) {
                            seen.add(key);
                            const t = this.nodes[lid];
                            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', n.x); line.setAttribute('y1', n.y);
                            line.setAttribute('x2', t.x); line.setAttribute('y2', t.y);
                            line.setAttribute('class', 'link-path');
                            linksL.appendChild(line);
                        }
                    });

                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.setAttribute('class', 'node');
                    g.addEventListener('click', () => this.clickNode(n.id));

                    if (n.t === 'STEP') {
                        const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        r.setAttribute('x', n.x - 22); r.setAttribute('y', n.y - 22);
                        r.setAttribute('width', '44'); r.setAttribute('height', '44');
                        r.setAttribute('rx', '6'); r.setAttribute('class', 'tile tile-step');
                        r.setAttribute('id', `tile-${n.id}`);
                        g.appendChild(r);
                    } else {
                        const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        circ.setAttribute('cx', n.x); circ.setAttribute('cy', n.y);
                        circ.setAttribute('r', n.t === 'BASE_START' ? '70' : '55');
                        circ.setAttribute('class', 'tile tile-base');
                        circ.setAttribute('id', `tile-${n.id}`);
                        circ.style.stroke = n.c;
                        g.appendChild(circ);

                        if (n.n) {
                            const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                            t.setAttribute('x', n.x); t.setAttribute('y', n.y + (n.y > 500 ? 95 : -80));
                            t.setAttribute('fill', '#fff'); t.setAttribute('text-anchor', 'middle');
                            t.setAttribute('class', 'label'); t.textContent = n.n;
                            g.appendChild(t);
                        }
                    }
                    nodesL.appendChild(g);
                });
            }

            renderPawns() {
                const layer = document.getElementById('lay-pawns');
                layer.innerHTML = '';
                const pots = {};
                this.pawns.forEach(p => { pots[p.node] = pots[p.node] || []; pots[p.node].push(p); });

                Object.entries(pots).forEach(([nid, ps]) => {
                    const node = this.nodes[nid];
                    ps.forEach((p, idx) => {
                        const ox = (idx - (ps.length-1)/2) * 35;
                        const oy = ps.length > 2 ? (idx % 2 === 0 ? -15 : 15) : 0;
                        const moveG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        moveG.setAttribute('transform', `translate(${node.x + ox}, ${node.y + oy})`);
                        moveG.setAttribute('class', 'pawn-g');
                        const bodyG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        bodyG.classList.add('pawn-visual');
                        if (this.selected === p) bodyG.classList.add('pawn-selected');
                        if (this.state === 'PICK' && p.side === this.turn) bodyG.classList.add('pawn-jumping');
                        if (this.state === 'EXEC') moveG.style.pointerEvents = 'none';
                        else {
                            moveG.style.pointerEvents = 'all';
                            moveG.addEventListener('click', (e) => { e.stopPropagation(); this.clickPawn(p); });
                        }
                        const pth = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        pth.setAttribute('d', 'M-22,25 L22,25 L18,-15 C15,-30 0,-45 0,-45 C0,-45 -15,-30 -18,-15 Z');
                        pth.setAttribute('fill', p.c); pth.setAttribute('stroke', '#fff'); pth.setAttribute('stroke-width', '3');
                        bodyG.appendChild(pth);
                        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        txt.setAttribute('y', -22); txt.setAttribute('text-anchor', 'middle');
                        txt.setAttribute('fill', '#fff'); txt.setAttribute('font-size', '22'); txt.setAttribute('font-weight', '900');
                        txt.textContent = p.i; bodyG.appendChild(txt);
                        moveG.appendChild(bodyG);
                        layer.appendChild(moveG);
                    });
                });
            }

            bindAll() { document.getElementById('roll-btn').onclick = () => this.roll(); }

            async roll() {
                if (this.state !== 'ROLL') return;
                const dv = document.getElementById('dice-box');
                const fs = ['тЪА','тЪБ','тЪВ','тЪГ','тЪД','тЪЕ'];
                for(let i=0; i<15; i++) {
                    dv.innerText = fs[Math.floor(Math.random()*6)];
                    await new Promise(r => setTimeout(r, 60));
                }
                this.diceValue = Math.floor(Math.random() * 6) + 1;
                dv.innerText = fs[this.diceValue-1];
                this.state = 'PICK';
                this.update();
            }

            clickPawn(p) {
                if (this.state !== 'PICK' || p.side !== this.turn) return;
                this.selected = p;
                this.calc(p.node, this.diceValue);
                if (this.dests.length === 0) { this.nextTurn(); return; }
                this.state = 'EXEC';
                this.update();
            }

            calc(start, d) {
                this.dests = [];
                let q = [{ id: start, d: 0, p: [start] }];
                let set = new Set();
                while(q.length > 0) {
                    let { id, d: dist, p: path } = q.shift();
                    if (dist === d) { set.add(id); continue; }
                    this.nodes[id].links.forEach(next => {
                        if (path.length < 2 || next !== path[path.length - 2]) {
                            q.push({ id: next, d: dist + 1, p: [...path, next] });
                        }
                    });
                }
                this.dests = Array.from(set).filter(x => x !== start);
            }

            clickNode(id) {
                if (this.state !== 'EXEC' || !this.dests.includes(id)) return;
                const p = this.selected;
                p.node = id;
                const riv = this.pawns.find(x => x.node === id && x.side !== p.side);
                if (riv) {
                    this.pawns = this.pawns.filter(x => x !== riv);
                }
                this.nextTurn();
            }

            nextTurn() {
                this.turn = (this.turn === 'INVADER' ? 'GUARD' : 'INVADER');
                this.state = 'ROLL'; this.selected = null; this.dests = [];
                this.update(); this.verifyWins();
            }

            update() {
                document.getElementById('roll-btn').disabled = (this.state !== 'ROLL');
                const t = document.getElementById('status-turn');
                t.innerText = this.turn === 'INVADER' ? 'TURNO: INVASORES' : 'TURNO: GUARDI├ХES';
                t.style.color = this.turn === 'INVADER' ? 'var(--invader)' : 'var(--guardian)';
                const h = document.getElementById('game-hint');
                if (this.state === 'ROLL') h.innerText = "ROLE O DADO";
                else if (this.state === 'PICK') h.innerText = "CLIQUE NO PI├ГO QUE EST├Б PULANDO";
                else h.innerText = "CLIQUE NA CAIXA QUE BRILHA";
                document.querySelectorAll('.tile').forEach(c => c.classList.remove('tile-active'));
                this.dests.forEach(id => {
                    const el = document.getElementById(`tile-${id}`);
                    if (el) el.classList.add('tile-active');
                });
                this.renderPawns();
            }

            verifyWins() {
                const g = this.pawns.filter(x => x.side === 'GUARD').length;
                const i = this.pawns.filter(x => x.side === 'INVADER').length;
                if (i === 0) this.win("GUARDI├ХES VENCERAM!");
                if (g === 0) this.win("INVASORES VENCERAM!");
            }

            win(t) { document.getElementById('win-txt').innerText = t; document.getElementById('win-overlay').style.display = 'flex'; }
        }

        function varVal(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
        window.onload = () => new JogoEngine();
    </script>
</body>
</html>
