<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomas em Guerra: A Trilha do Mapa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --guardian: #2ecc71;
            --invader: #e74c3c;
            --highlight: #f1c40f;
            --debuff: #ff0000;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            background: #000; 
            font-family: 'Outfit', sans-serif; 
            height: 100vh; 
            display: grid;
            grid-template-areas: "header header" "board sidebar";
            grid-template-columns: 1fr 380px;
            grid-template-rows: 80px 1fr;
            overflow: hidden;
            color: #fff;
        }

        header {
            grid-area: header;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 2px solid #333;
            z-index: 100;
        }
        .logo { font-family: 'Fredoka One'; font-size: 2rem; }

        #board-viewer {
            grid-area: board;
            position: relative;
            background-color: #579bc1;
            background-image: url('mapa.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-svg { width: 95%; height: 95%; max-width: 90vh; }

        #sidebar {
            grid-area: sidebar;
            background: #121420;
            border-left: 2px solid #000;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .ui-box { background: #000; border-radius: 15px; padding: 25px; border: 2px solid #333; text-align: center; }
        #dice-view { font-size: 5rem; margin-bottom: 5px; font-family: 'Fredoka One'; color: var(--highlight); }
        
        .btn { 
            width: 100%; padding: 20px; border-radius: 15px; border: none; 
            font-family: 'Fredoka One'; font-size: 1.3rem; cursor: pointer; transition: 0.2s;
            background: #fff; color: #000; box-shadow: 0 6px 0 #999;
        }
        .btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 9px 0 #999; }
        .btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 #999; }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }

        .hint { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 2px solid var(--highlight); color: var(--highlight); font-weight: 900; text-align: center; text-transform: uppercase; font-size: 0.9rem; }

        #log { flex: 1; background: #000; border-radius: 12px; padding: 15px; overflow-y: auto; font-size: 0.82rem; color: #888; border: 1px solid #222; }

        /* Board Elements */
        .node-tile { fill: rgba(255,255,255,0.01); transition: 0.2s; cursor: pointer; stroke: none; }
        .node-tile:hover { fill: rgba(255,255,255,0.1); }
        
        .debuff-marker { stroke: rgba(255,0,0,0.4) !important; stroke-width: 5 !important; }

        .target-active { 
            stroke: #fff !important; stroke-width: 12 !important; 
            stroke-dasharray: 10 5; animation: dashAnim 3s linear infinite; 
            fill: rgba(255,255,255,0.4) !important; r: 40 !important;
        }
        @keyframes dashAnim { from { stroke-dashoffset: 60; } to { stroke-dashoffset: 0; } }

        /* Pawns */
        .pawn-g { transition: transform 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); pointer-events: all; }
        .pawn-visual { filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8)); cursor: pointer; }
        .pawn-jumping { animation: pawnHop 0.7s infinite alternate ease-in-out; }
        @keyframes pawnHop { from { transform: translateY(0); } to { transform: translateY(-20px); } }
        .pawn-selected { filter: drop-shadow(0 0 25px #fff); transform: translateY(-30px) scale(1.4); z-index: 1000; }

        #win-modal { position: fixed; inset: 0; background: rgba(0,0,0,1); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        #debuff-alert { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); background: #ff0000; color: #fff; padding: 10px 20px; border-radius: 10px; font-weight: 900; display: none; animation: pop 0.5s; z-index: 2000; }
        @keyframes pop { 0% { transform: translate(-50%, -20px) scale(0); } 100% { transform: translate(-50%, 0) scale(1); } }
    </style>
</head>
<body>
    <header>
        <div class="logo">BIOMAS EM GUERRA</div>
        <div id="stat-turn" style="color:var(--invader); font-weight: 900; font-size: 1.5rem;">TURNO: INVASORES</div>
    </header>

    <div id="board-viewer">
        <div id="debuff-alert">⚠️ CAIU NO DEBUFF! VOLTOU 2 CASAS!</div>
        <svg id="game-svg" viewBox="0 0 1000 1000">
            <g id="lay-nodes"></g> 
            <g id="lay-pawns"></g>
        </svg>
    </div>

    <div id="sidebar">
        <div class="ui-box">
            <div id="dice-view">🎲</div>
            <button class="btn" id="btn-roll">ROLAR DADO</button>
        </div>

        <div id="game-hint" class="hint">ROLE O DADO</div>
        
        <div id="log"></div>
    </div>

    <div id="win-modal">
        <h1 id="win-txt" style="font-family: Fredoka One; font-size: 5rem; color: #fff; margin-bottom: 20px;">VENCERAM!</h1>
        <button class="btn" style="width: auto; padding: 25px 60px;" onclick="location.reload()">NOVA PARTIDA</button>
    </div>

    <script>
        const BIOMAS = [
            { id: 'CAA', n: 'Caatinga', x: 250, y: 150 },
            { id: 'PAN', n: 'Pantanal', x: 745, y: 135 },
            { id: 'CER', n: 'Cerrado', x: 890, y: 520 },
            { id: 'AMZ', n: 'Amazônia', x: 745, y: 885 },
            { id: 'MAT', n: 'Mata Atlântica', x: 260, y: 885 },
            { id: 'COS', n: 'Costão Rochoso', x: 130, y: 520 }
        ];

        class JogoEngine {
            constructor() {
                this.turn = 'INVADER'; 
                this.dice = 0;
                this.state = 'ROLL'; 
                this.nodes = {};
                this.pawns = [];
                this.selected = null;
                this.dests = [];

                this.setupGraph();
                this.setupPawns();
                this.bind();
                this.ui();
            }

            setupGraph() {
                this.add('START', 485, 480, 'START');

                BIOMAS.forEach(b => {
                    let prev = 'START';
                    const steps = 4;
                    for (let i = 1; i <= steps; i++) {
                        const sid = `r-${b.id}-${i}`;
                        const t = i / (steps + 1);
                        const x = 485 + (b.x - 485) * t;
                        const y = 480 + (b.y - 480) * t;
                        this.add(sid, x, y, 'STEP');
                        this.link(prev, sid);
                        prev = sid;
                    }
                    this.add(b.id, b.x, b.y, 'BIOME');
                    this.link(prev, b.id);
                });

                BIOMAS.forEach((b, i) => {
                    const next = BIOMAS[(i + 1) % 6];
                    let prevNode = b.id;
                    const steps = 7; 
                    for (let j = 1; j <= steps; j++) {
                        const sid = `c-${b.id}-${next.id}-${j}`;
                        const t = j / (steps + 1);
                        const midA = Math.atan2(b.y - 480, b.x - 485);
                        const endA = Math.atan2(next.y - 480, next.x - 485);
                        let diff = endA - midA;
                        if (diff < 0) diff += Math.PI * 2;
                        const a = midA + diff * t;
                        const d = 370;
                        const x = 485 + d * Math.cos(a);
                        const y = 480 + d * Math.sin(a);

                        // CASINHAS VERMELHAS (DEBUFFS) - Na imagem são as casas intermediárias
                        const isDebuff = (j === 4); // Casinha do meio no anel circular
                        this.add(sid, x, y, isDebuff ? 'DEBUFF' : 'STEP');
                        this.link(prevNode, sid);
                        prevNode = sid;
                    }
                    this.link(prevNode, next.id);
                });
                this.render();
            }

            add(id, x, y, type) { this.nodes[id] = { id, x, y, type, links: [] }; }
            link(a, b) { this.nodes[a].links.push(b); this.nodes[b].links.push(a); }

            setupPawns() {
                // Todos os jogadores começam no START conforme solicitado
                for (let i = 1; i <= 3; i++) {
                    this.pawns.push({ id: `i${i}`, side: 'INVADER', node: 'START', color: '#ff3333', i: '👹', prev: 'START' });
                    this.pawns.push({ id: `g${i}`, side: 'GUARD', node: 'START', color: '#27ae60', i: '🛡️', prev: 'START' });
                }
                this.renderPawns();
            }

            render() {
                const layer = document.getElementById('lay-nodes');
                Object.values(this.nodes).forEach(n => {
                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.setAttribute('class', 'node');
                    g.addEventListener('click', () => this.nodeClick(n.id));
                    const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circ.setAttribute('cx', n.x); circ.setAttribute('cy', n.y);
                    circ.setAttribute('r', n.type === 'START' ? 65 : (n.type === 'BIOME' ? 45 : 25));
                    circ.setAttribute('class', 'node-tile');
                    if (n.type === 'DEBUFF') circ.classList.add('debuff-marker');
                    circ.setAttribute('id', `c-${n.id}`);
                    g.appendChild(circ);
                    layer.appendChild(g);
                });
            }

            renderPawns() {
                const layer = document.getElementById('lay-pawns');
                layer.innerHTML = '';
                const pots = {};
                this.pawns.forEach(p => { pots[p.node] = pots[p.node] || []; pots[p.node].push(p); });
                Object.entries(pots).forEach(([sid, ps]) => {
                    const n = this.nodes[sid];
                    ps.forEach((p, idx) => {
                        const ox = (idx - (ps.length-1)/2) * 35;
                        const oy = ps.length > 2 ? (idx % 2 === 0 ? -15 : 15) : 0;
                        const mG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        mG.setAttribute('transform', `translate(${n.x + ox}, ${n.y + oy})`);
                        mG.setAttribute('class', 'pawn-g');
                        const pth = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        pth.setAttribute('d', 'M-22,25 L22,25 L18,-15 C15,-30 0,-45 0,-45 C0,-45 -15,-30 -18,-15 Z');
                        pth.setAttribute('fill', p.color); pth.setAttribute('stroke', '#fff'); pth.setAttribute('stroke-width', '3');
                        pth.setAttribute('class', 'pawn-visual');
                        if (this.selected === p) pth.classList.add('pawn-selected');
                        if (this.state === 'PICK' && p.side === this.turn) pth.classList.add('pawn-jumping');
                        if (this.state === 'MOVE') mG.style.pointerEvents = 'none';
                        else {
                            mG.style.pointerEvents = 'all';
                            mG.addEventListener('click', (e) => { e.stopPropagation(); this.pawnClick(p); });
                        }
                        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        txt.setAttribute('y', -22); txt.setAttribute('text-anchor', 'middle');
                        txt.setAttribute('fill', '#fff'); txt.setAttribute('font-size', '22'); txt.setAttribute('font-weight', '900');
                        txt.textContent = p.i;
                        mG.appendChild(pth); mG.appendChild(txt);
                        layer.appendChild(mG);
                    });
                });
            }

            bind() { document.getElementById('btn-roll').onclick = () => this.roll(); }

            async roll() {
                if (this.state !== 'ROLL') return;
                const dv = document.getElementById('dice-view');
                const fs = ['⚀','⚁','⚂','⚃','⚄','⚅'];
                for(let i=0; i<15; i++) {
                    dv.innerText = fs[Math.floor(Math.random()*6)];
                    await new Promise(r => setTimeout(r, 60));
                }
                this.dice = Math.floor(Math.random() * 6) + 1;
                dv.innerText = fs[this.dice-1];
                this.state = 'PICK';
                this.ui();
            }

            pawnClick(p) {
                if (this.state !== 'PICK' || p.side !== this.turn) return;
                this.selected = p;
                this.calcMoves(p.node, this.dice);
                if (this.dests.length === 0) { this.turnEnd(); return; }
                this.state = 'MOVE';
                this.ui();
            }

            calcMoves(start, dist) {
                this.dests = [];
                let q = [{ id: start, d: 0, p: [start] }];
                let set = new Set();
                while(q.length > 0) {
                    let { id, d, p } = q.shift();
                    if (d === dist) { set.add(id); continue; }
                    this.nodes[id].links.forEach(next => {
                        if (p.length < 2 || next !== p[p.length - 2]) {
                            q.push({ id: next, d: d + 1, p: [...p, next] });
                        }
                    });
                }
                this.dests = Array.from(set).filter(x => x !== start);
            }

            nodeClick(id) {
                if (this.state !== 'MOVE' || !this.dests.includes(id)) return;
                const p = this.selected;
                const oldPos = p.node;
                p.node = id;

                // LOGICA DE DEBUFF (AS CASINHAS VERMELHAS)
                if (this.nodes[id].type === 'DEBUFF') {
                    document.getElementById('debuff-alert').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('debuff-alert').style.display = 'none';
                        p.node = oldPos; // Volta para onde estava (Debuff de mandar pro inicio/voltar)
                        this.renderPawns();
                    }, 1500);
                    this.log("Caiu na casinha vermelha! Voltou para o início da trilha.", 'system');
                }

                const riv = this.pawns.find(x => x.node === id && x.side !== p.side);
                if (riv && id !== 'START') {
                    this.pawns = this.pawns.filter(x => x !== riv);
                    this.log("Bateu no oponente e o removeu!", 'system');
                }
                this.turnEnd();
            }

            turnEnd() {
                this.turn = (this.turn === 'INVADER' ? 'GUARD' : 'INVADER');
                this.state = 'ROLL'; this.selected = null; this.dests = [];
                this.ui(); this.checkVictory();
            }

            ui() {
                document.getElementById('btn-roll').disabled = (this.state !== 'ROLL');
                const t = document.getElementById('stat-turn');
                t.innerText = this.turn === 'INVADER' ? 'TURNO: INVASORES' : 'TURNO: GUARDIÕES';
                t.style.color = this.turn === 'INVADER' ? 'var(--invader)' : 'var(--debuff)';
                const h = document.getElementById('game-hint');
                if (this.state === 'ROLL') h.innerText = "ROLE O DADO";
                else if (this.state === 'PICK') h.innerText = "CLIQUE NO PIÃO QUE ESTÁ PULANDO";
                else h.innerText = "CLIQUE NA CAIXA DO MAPA QUE BRILHA";
                document.querySelectorAll('.node-tile').forEach(c => c.classList.remove('target-active'));
                this.dests.forEach(id => {
                    const el = document.getElementById(`c-${id}`);
                    if (el) el.classList.add('target-active');
                });
                this.renderPawns();
            }

            log(m, c) {
                const l = document.getElementById('log');
                const d = document.createElement('div');
                d.style.padding = '5px 0'; d.style.color = c === 'invader' ? '#ff7675' : '#78e08f';
                d.innerText = `> ${m}`; l.prepend(d);
            }

            checkVictory() {
                // Ganha quem chegar no bioma destino ou eliminar todos?
                // Vamos manter eliminacao por enquanto.
                const g = this.pawns.filter(x => x.side === 'GUARD').length;
                const i = this.pawns.filter(x => x.side === 'INVADER').length;
                if (i === 0) this.win("GUARDIÕES VENCERAM!");
                if (g === 0) this.win("INVASORES VENCERAM!");
            }

            win(t) { document.getElementById('win-txt').innerText = t; document.getElementById('win-modal').style.display = 'flex'; }
        }

        window.onload = () => new JogoEngine();
    </script>
</body>
</html>
