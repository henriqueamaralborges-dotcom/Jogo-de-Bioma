<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomas em Guerra: O Caminho da Sobrevivência</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0c10;
            --accent-invader: #ff3e3e;
            --accent-biome: #00f2ff;
            --path-default: rgba(255,255,255,0.1);
            --path-active: rgba(0,242,255,0.4);
            
            --color-amazon: #2aff7f;
            --color-cerrado: #ffcc33;
            --color-caatinga: #ff9933;
            --color-atlantica: #00ba47;
            --color-costao: #33ccff;
            --color-pantanal: #3388ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-areas: 
                "header header"
                "board sidebar";
            grid-template-columns: 1fr 320px;
            grid-template-rows: 90px 1fr;
        }

        header {
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(15,20,30,0.9);
            border-bottom: 2px solid #222;
            z-index: 10;
        }

        .title-area h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 3px;
            color: #fff;
        }

        #game-board {
            grid-area: board;
            position: relative;
            background: radial-gradient(circle at center, #1a202c 0%, #0a0c10 80%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #svg-canvas { width: 95%; height: 95%; }

        aside {
            grid-area: sidebar;
            background: #111;
            border-left: 2px solid #222;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .dice-container {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #333;
        }
        .dice {
            font-size: 3rem;
            margin: 10px 0;
            color: #ffeb3b;
            font-family: 'Orbitron';
            text-shadow: 0 0 15px rgba(255,235,59,0.5);
        }

        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Orbitron';
            transition: 0.3s;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #log {
            flex: 1;
            overflow-y: auto;
            font-size: 0.8rem;
            color: #888;
            padding-right: 10px;
        }
        .log-msg { margin-bottom: 8px; border-left: 3px solid #444; padding-left: 8px; }
        .log-msg.biomes { border-color: var(--accent-biome); }
        .log-msg.invader { border-color: var(--accent-invader); }

        /* SVG Space Styles */
        .space { cursor: pointer; transition: 0.2s; }
        .space:hover { fill-opacity: 0.5; }
        .space-dot { fill: var(--path-default); stroke: #333; }
        .space-biome { stroke-width: 4; }
        .space-highlight { stroke: #fff; stroke-width: 3; fill: rgba(255,255,255,0.2); }
        
        .pawn { pointer-events: none; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            display: none;
        }
        .modal-card {
            background: #111;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            max-width: 450px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="title-area">
            <h1>BIOMAS EM GUERRA</h1>
        </div>
        <div id="turn-info" style="text-align: center">
            <p id="turn-text" style="font-family: Orbitron; font-size: 1.2rem; color: var(--accent-biome)">TURNO DOS BIOMAS</p>
            <p id="move-text" style="font-size: 0.8rem; color: #888">ROLE O DADO PARA MOVER</p>
        </div>
        <div class="stats">
            <span id="score-biomes" style="color: var(--accent-biome)">VIVOS: 6</span> | <span id="score-invader" style="color: var(--accent-invader)">INVASORES: 3</span>
        </div>
    </header>

    <main id="game-board">
        <svg id="svg-canvas" viewBox="0 0 1000 1000">
            <g id="paths-layer"></g>
            <g id="spaces-layer"></g>
            <g id="pawns-layer"></g>
        </svg>
    </main>

    <aside>
        <div class="dice-container">
            <p style="font-size: 0.7rem; color: #888">DISTÂNCIA</p>
            <div class="dice" id="dice-val">?</div>
            <button class="btn" id="btn-roll" style="width: 100%">ROLAR DADO</button>
        </div>
        
        <div id="log"></div>
    </aside>

    <div id="modal">
        <div class="modal-card">
            <h2 id="modal-title" style="margin-bottom: 20px; font-family: Orbitron">VITÓRIA</h2>
            <p id="modal-body" style="color: #ccc; margin-bottom: 30px"></p>
            <button class="btn" onclick="location.reload()">RECOMEÇAR</button>
        </div>
    </div>

    <script>
        const BIOMES = [
            { id: 'AMAZONIA', name: 'Amazônia', color: '#2aff7f', angle: -90 },
            { id: 'CERRADO', name: 'Cerrado', color: '#ffcc33', angle: -30 },
            { id: 'CAATINGA', name: 'Caatinga', color: '#ff9933', angle: 30 },
            { id: 'ATLANTICA', name: 'Mata Atlântica', color: '#00ba47', angle: 90 },
            { id: 'COSTAO', name: 'Costão Rochoso', color: '#33ccff', angle: 150 },
            { id: 'PANTANAL', name: 'Pantanal', color: '#3388ff', angle: 210 }
        ];

        class Game {
            constructor() {
                this.turn = 'BIOMES'; 
                this.dice = 0;
                this.state = 'WAIT_ROLL'; // WAIT_ROLL, WAIT_PIECE, WAIT_DEST
                this.pawns = [];
                this.spaces = [];
                this.selectedPawn = null;
                this.validMoves = [];
                
                this.initBoard();
                this.initPawns();
                this.bindEvents();
            }

            initBoard() {
                // 1. Center Space
                this.spaces.push({ id: 'BASE', x: 500, y: 500, type: 'BASE', neighbors: [] });

                // 2. Radial Paths (Steps from Base to Biomes)
                BIOMES.forEach(b => {
                    const steps = 4; // 4 dots + Biome
                    const rad = 380;
                    let lastId = 'BASE';

                    for (let i = 1; i <= steps; i++) {
                        const dist = (rad / (steps + 1)) * i;
                        const x = 500 + dist * Math.cos(b.angle * Math.PI / 180);
                        const y = 500 + dist * Math.sin(b.angle * Math.PI / 180);
                        const sid = `rad-${b.id}-${i}`;
                        
                        const space = { id: sid, x, y, type: 'STEP', neighbors: [lastId] };
                        this.getSpace(lastId).neighbors.push(sid);
                        this.spaces.push(space);
                        lastId = sid;
                    }

                    // Biome Space
                    const bx = 500 + rad * Math.cos(b.angle * Math.PI / 180);
                    const by = 500 + rad * Math.sin(b.angle * Math.PI / 180);
                    const biomeSpace = { id: b.id, x: bx, y: by, type: 'BIOME', name: b.name, color: b.color, neighbors: [lastId] };
                    this.getSpace(lastId).neighbors.push(b.id);
                    this.spaces.push(biomeSpace);
                });

                // 3. Circular Paths (Between Biomes)
                BIOMES.forEach((b, i) => {
                    const next = BIOMES[(i + 1) % 6];
                    const steps = 5;
                    let lastId = b.id;

                    for (let j = 1; j <= steps; j++) {
                        const t = j / (steps + 1);
                        // Interpolate angle for a curved path effect
                        const startA = b.angle * Math.PI / 180;
                        const endA = (i === 5 ? 270 : next.angle) * Math.PI / 180;
                        const currentA = startA + (endA - startA) * t;
                        const dist = 380; // Keep circular
                        
                        const x = 500 + dist * Math.cos(currentA);
                        const y = 500 + dist * Math.sin(currentA);
                        const sid = `circ-${b.id}-${next.id}-${j}`;
                        
                        const space = { id: sid, x, y, type: 'STEP', neighbors: [lastId] };
                        this.getSpace(lastId).neighbors.push(sid);
                        this.spaces.push(space);
                        lastId = sid;
                    }
                    this.getSpace(lastId).neighbors.push(next.id);
                    this.getSpace(next.id).neighbors.push(lastId);
                });

                this.renderSpaces();
            }

            getSpace(id) { return this.spaces.find(s => s.id === id); }

            initPawns() {
                // Biome pawns start at their biomes
                BIOMES.forEach(b => {
                    this.pawns.push({ id: `pawn-${b.id}`, side: 'BIOMES', spaceId: b.id, color: b.color, icon: '🌲' });
                });
                // Invader pawns start at center
                for (let i = 0; i < 3; i++) {
                    this.pawns.push({ id: `pawn-inv-${i}`, side: 'INVADER', spaceId: 'BASE', color: '#ff3e3e', icon: '👹' });
                }
                this.renderPawns();
            }

            renderSpaces() {
                const layer = document.getElementById('spaces-layer');
                this.spaces.forEach(s => {
                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.setAttribute('class', 'space');
                    g.onclick = () => this.handleSpaceClick(s.id);

                    if (s.type === 'BASE') {
                        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        poly.setAttribute('cx', s.x); poly.setAttribute('cy', s.y); poly.setAttribute('r', '50');
                        poly.setAttribute('fill', '#000'); poly.setAttribute('stroke', '#ff3e3e');
                        g.appendChild(poly);
                    } else if (s.type === 'BIOME') {
                        const c = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        c.setAttribute('x', s.x - 40); c.setAttribute('y', s.y - 40);
                        c.setAttribute('width', '80'); c.setAttribute('height', '80');
                        c.setAttribute('rx', '15');
                        c.setAttribute('fill', '#111'); c.setAttribute('stroke', s.color);
                        g.appendChild(c);
                        
                        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        t.setAttribute('x', s.x); t.setAttribute('y', s.y + 60);
                        t.setAttribute('text-anchor', 'middle'); t.setAttribute('fill', '#888');
                        t.setAttribute('font-size', '12'); t.textContent = s.name;
                        g.appendChild(t);
                    } else {
                        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        dot.setAttribute('cx', s.x); dot.setAttribute('cy', s.y); dot.setAttribute('r', '12');
                        dot.setAttribute('class', 'space-dot');
                        dot.id = `dot-${s.id}`;
                        g.appendChild(dot);
                    }
                    layer.appendChild(g);
                });
            }

            renderPawns() {
                const layer = document.getElementById('pawns-layer');
                layer.innerHTML = '';
                
                // Grouping to avoid perfect overlap
                const posMap = {};
                this.pawns.forEach(p => {
                    if (!posMap[p.spaceId]) posMap[p.spaceId] = [];
                    posMap[p.spaceId].push(p);
                });

                Object.entries(posMap).forEach(([sid, ps]) => {
                    const s = this.getSpace(sid);
                    ps.forEach((p, idx) => {
                        const ox = (idx - (ps.length-1)/2) * 20;
                        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        g.setAttribute('class', 'pawn');
                        g.setAttribute('transform', `translate(${s.x + ox}, ${s.y})`);
                        g.style.cursor = (this.turn === p.side && this.state === 'WAIT_PIECE') ? 'pointer' : 'default';
                        g.onclick = (e) => { e.stopPropagation(); this.handlePawnClick(p); };

                        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        c.setAttribute('r', '18'); c.setAttribute('fill', '#fff');
                        c.setAttribute('stroke', p.color); c.setAttribute('stroke-width', this.selectedPawn === p ? '5' : '1');
                        
                        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        text.setAttribute('y', 6); text.setAttribute('text-anchor', 'middle');
                        text.setAttribute('font-size', '16'); text.textContent = p.icon;

                        g.appendChild(c); g.appendChild(text);
                        layer.appendChild(g);
                    });
                });
            }

            bindEvents() {
                document.getElementById('btn-roll').onclick = () => this.rollDice();
            }

            rollDice() {
                if (this.state !== 'WAIT_ROLL') return;
                this.dice = Math.floor(Math.random() * 6) + 1;
                document.getElementById('dice-val').innerText = this.dice;
                this.state = 'WAIT_PIECE';
                document.getElementById('btn-roll').disabled = true;
                this.log(`Rolou: ${this.dice}. Escolha sua peça.`, this.turn.toLowerCase());
                this.renderPawns();
            }

            handlePawnClick(p) {
                if (this.state !== 'WAIT_PIECE' || p.side !== this.turn) return;
                this.selectedPawn = p;
                this.calculateValidMoves(p.spaceId, this.dice);
                this.state = 'WAIT_DEST';
                this.renderPawns();
                this.renderHighlights();
            }

            calculateValidMoves(curr, dist) {
                this.validMoves = [];
                let queue = [{ id: curr, d: 0 }];
                let visited = new Set();

                while (queue.length > 0) {
                    let { id, d } = queue.shift();
                    if (d === dist) {
                        this.validMoves.push(id);
                        continue;
                    }
                    const space = this.getSpace(id);
                    space.neighbors.forEach(n => {
                        // Restriction: Invaders can only use Circular if they own a biome bridgehead? 
                        // Simplified: Pião game = move everywhere if connected.
                        queue.push({ id: n, d: d + 1 });
                    });
                }
                // Filter unique
                this.validMoves = [...new Set(this.validMoves)];
            }

            renderHighlights() {
                // Remove old
                document.querySelectorAll('.space-highlight').forEach(el => el.remove());
                const layer = document.getElementById('spaces-layer');
                this.validMoves.forEach(mid => {
                    const s = this.getSpace(mid);
                    const h = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    h.setAttribute('cx', s.x); h.setAttribute('cy', s.y); h.setAttribute('r', '20');
                    h.setAttribute('class', 'space-highlight');
                    h.style.pointerEvents = 'none';
                    layer.appendChild(h);
                });
            }

            handleSpaceClick(sid) {
                if (this.state !== 'WAIT_DEST' || !this.validMoves.includes(sid)) return;
                
                const oldSpace = this.selectedPawn.spaceId;
                this.selectedPawn.spaceId = sid;
                
                // Conflict
                const rivals = this.pawns.filter(p => p.spaceId === sid && p.side !== this.turn);
                if (rivals.length > 0) {
                    this.log(`CONFRONTO em ${sid}!`, 'system');
                    // Remove rival
                    this.pawns = this.pawns.filter(p => p !== rivals[0]);
                    this.log(`${rivals[0].side} foi capturado!`, 'system');
                }

                this.log(`Ficou em ${sid}`, this.turn.toLowerCase());
                this.endTurn();
            }

            endTurn() {
                this.turn = this.turn === 'BIOMES' ? 'INVADER' : 'BIOMES';
                this.state = 'WAIT_ROLL';
                this.selectedPawn = null;
                this.validMoves = [];
                this.dice = 0;
                
                document.getElementById('dice-val').innerText = '?';
                document.getElementById('btn-roll').disabled = false;
                
                const text = document.getElementById('turn-text');
                text.innerText = this.turn === 'BIOMES' ? 'TURNO DOS BIOMAS' : 'TURNO DOS INVASORES';
                text.style.color = this.turn === 'BIOMES' ? 'var(--accent-biome)' : 'var(--accent-invader)';
                
                this.renderPawns();
                // Clear highlights
                document.querySelectorAll('.space-highlight').forEach(el => el.remove());
                this.updateScore();
                this.checkVictory();
            }

            updateScore() {
                const bCount = this.pawns.filter(p => p.side === 'BIOMES').length;
                const iCount = this.pawns.filter(p => p.side === 'INVADER').length;
                document.getElementById('score-biomes').innerText = `VIVOS: ${bCount}`;
                document.getElementById('score-invader').innerText = `INVASORES: ${iCount}`;
            }

            checkVictory() {
                const bCount = this.pawns.filter(p => p.side === 'BIOMES').length;
                const iCount = this.pawns.filter(p => p.side === 'INVADER').length;
                
                if (iCount === 0) this.endGame("VITÓRIA DA NATUREZA", "Todos os invasores foram repelidos!");
                if (bCount === 0) this.endGame("FIM DO MUNDO", "A destruição consumiu todos os biomas.");
            }

            endGame(title, body) {
                document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-body').innerText = body;
                document.getElementById('modal').style.display = 'flex';
            }

            log(msg, cls) {
                const l = document.getElementById('log');
                const div = document.createElement('div');
                div.className = `log-msg ${cls}`;
                div.innerText = `> ${msg}`;
                l.prepend(div);
            }
        }

        const game = new Game();
    </script>
</body>
</html>
