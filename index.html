<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomas em Guerra: A Grande Trilha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080a0e;
            --accent-invader: #ff4757;
            --accent-biome: #2ed573;
            --path-dot: #2f3542;
            --path-highlight: rgba(255, 255, 255, 0.4);
            
            --color-amazon: #2ed573;
            --color-cerrado: #ffa502;
            --color-caatinga: #eccc68;
            --color-atlantica: #1e90ff;
            --color-costao: #70a1ff;
            --color-pantanal: #3742fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-areas: "header sidebar" "board sidebar";
            grid-template-columns: 1fr 350px;
            grid-template-rows: 100px 1fr;
        }

        header {
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(0,0,0,0.5);
            border-bottom: 2px solid #1a1a1a;
        }

        #game-board {
            grid-area: board;
            position: relative;
            background: radial-gradient(circle at center, #151921 0%, #080a0e 80%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #svg-canvas { width: 95%; height: 95%; }

        aside {
            grid-area: sidebar;
            background: #111;
            border-left: 2px solid #222;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        /* 3D Dice Animation */
        .dice-box {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
        }
        #dice-visual {
            width: 80px; height: 80px;
            background: #fff;
            color: #000;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-family: 'Orbitron';
            font-size: 2.5rem;
            font-weight: 900;
            box-shadow: 0 5px 20px rgba(255,255,255,0.2), inset 0 -5px 0 #ccc;
            transition: 0.1s;
        }
        .rolling {
            animation: roll 0.2s infinite linear;
        }
        @keyframes roll {
            0% { transform: rotate(0deg) scale(0.9); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(0.9); }
        }

        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Orbitron';
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #game-log {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            overflow-y: auto;
            font-size: 0.85rem;
            border: 1px solid #222;
        }
        .log-entry { margin-bottom: 10px; line-height: 1.4; border-left: 3px solid #444; padding-left: 10px; color: #aaa; }
        .log-biomes { border-color: var(--accent-biome); color: #fff; }
        .log-invader { border-color: var(--accent-invader); color: #fff; }

        /* SVG Space Styles */
        .node { cursor: pointer; transition: 0.3s; }
        .node:hover .node-base { fill-opacity: 0.8; }
        .node-highlight { stroke: #fff; stroke-width: 3; stroke-dasharray: 4 2; animation: rotateLines 5s linear infinite; }
        @keyframes rotateLines { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }

        /* Pawn/Pião Styles */
        .pawn { cursor: pointer; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8)); transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .pawn:hover { transform: scale(1.2); }
        .active-pawn { stroke: #fff; stroke-width: 4; filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); }

        #victory-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; display: none;
        }
        .modal-content {
            background: #111; border: 1px solid #333; padding: 50px; border-radius: 30px; text-align: center; max-width: 500px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1 style="font-family: Orbitron; letter-spacing: 5px;">BIOMAS EM GUERRA</h1>
        </div>
        <div class="status-panel">
            <span id="score-text" style="font-family: Orbitron; font-size: 1.1rem;">
                <span style="color:var(--accent-biome)">VIVOS: 6</span> | <span style="color:var(--accent-invader)">INVASORES: 3</span>
            </span>
        </div>
    </header>

    <main id="game-board">
        <svg id="svg-canvas" viewBox="0 0 1000 1000">
            <g id="links-layer" opacity="0.3"></g>
            <g id="spaces-layer"></g>
            <g id="pawns-layer"></g>
        </svg>
    </main>

    <aside>
        <div class="dice-box">
            <div id="dice-visual">?</div>
            <button class="btn" id="roll-btn">ROLAR DADO</button>
            <p id="turn-txt" style="margin-top: 15px; font-family: Orbitron; font-size: 0.7rem; color: #888;">TURNO DA NATUREZA</p>
        </div>

        <div id="game-log"></div>
    </aside>

    <div id="victory-modal">
        <div class="modal-content">
            <h1 id="victory-title" style="font-family: Orbitron; font-size: 2.5rem; margin-bottom: 20px;">VENCEU!</h1>
            <p id="victory-desc" style="color: #aaa; margin-bottom: 30px; font-size: 1.2rem;"></p>
            <button class="btn" onclick="location.reload()">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <script>
        const BIOMES_DEF = [
            { id: 'AMZ', name: 'Amazônia', color: '#2ed573', angle: -90 },
            { id: 'CER', name: 'Cerrado', color: '#ffa502', angle: -30 },
            { id: 'CAA', name: 'Caatinga', color: '#eccc68', angle: 30 },
            { id: 'MAT', name: 'Mata Atlântica', color: '#1e90ff', angle: 90 },
            { id: 'COS', name: 'Costão Rochoso', color: '#70a1ff', angle: 150 },
            { id: 'PAN', name: 'Pantanal', color: '#3742fa', angle: 210 }
        ];

        class GameEngine {
            constructor() {
                this.turn = 'BIOMES';
                this.diceValue = 0;
                this.state = 'WAIT_ROLL'; // WAIT_ROLL, SELECT_PAWN, SELECT_DEST
                this.spaces = {};
                this.pawns = [];
                this.selectedPawn = null;
                this.possibleDests = [];

                this.initBoard();
                this.initPawns();
                this.bindEvents();
            }

            initBoard() {
                // 1. Central Base Node
                this.spaces['BASE'] = { id: 'BASE', x: 500, y: 500, type: 'BASE', links: [] };

                // 2. Build Radial Trilha (Steps)
                BIOMES_DEF.forEach(b => {
                    const stepsCount = 4;
                    const maxRadius = 400;
                    let lastNodeId = 'BASE';

                    for (let i = 1; i <= stepsCount; i++) {
                        const dist = (maxRadius / (stepsCount + 1)) * i;
                        const x = 500 + dist * Math.cos(b.angle * Math.PI / 180);
                        const y = 500 + dist * Math.sin(b.angle * Math.PI / 180);
                        const id = `r-${b.id}-${i}`;
                        this.spaces[id] = { id, x, y, type: 'STEP', links: [lastNodeId] };
                        this.spaces[lastNodeId].links.push(id);
                        lastNodeId = id;
                    }

                    // Biome Node (The Tip)
                    const bx = 500 + maxRadius * Math.cos(b.angle * Math.PI / 180);
                    const by = 500 + maxRadius * Math.sin(b.angle * Math.PI / 180);
                    this.spaces[b.id] = { id: b.id, x: bx, y: by, type: 'BIOME', name: b.name, color: b.color, links: [lastNodeId] };
                    this.spaces[lastNodeId].links.push(b.id);
                });

                // 3. Circular Connections (Inter-biomes)
                BIOMES_DEF.forEach((b, i) => {
                    const next = BIOMES_DEF[(i + 1) % 6];
                    const steps = 6;
                    let prevId = b.id;
                    for (let j = 1; j <= steps; j++) {
                        const t = j / (steps + 1);
                        const startA = b.angle;
                        const endA = (i === 5 ? 270 : next.angle);
                        const angle = (startA + (endA - startA) * t) * Math.PI / 180;
                        const dist = 400;
                        const x = 500 + dist * Math.cos(angle);
                        const y = 500 + dist * Math.sin(angle);
                        const id = `c-${b.id}-${next.id}-${j}`;
                        this.spaces[id] = { id, x, y, type: 'STEP', links: [prevId] };
                        this.spaces[prevId].links.push(id);
                        prevId = id;
                    }
                    this.spaces[prevId].links.push(next.id);
                    this.spaces[next.id].links.push(prevId);
                });

                this.renderBoard();
            }

            initPawns() {
                // Biome pawns at their tips
                BIOMES_DEF.forEach(b => {
                    this.pawns.push({ id: `p-${b.id}`, side: 'BIOMES', spaceId: b.id, color: b.color, icon: '🌳' });
                });
                // 3 Invaders at the center
                for (let i = 0; i < 3; i++) {
                    this.pawns.push({ id: `i-${i}`, side: 'INVADER', spaceId: 'BASE', color: '#ff4757', icon: '💀' });
                }
                this.renderPawns();
            }

            renderBoard() {
                const spaceLayer = document.getElementById('spaces-layer');
                const linksLayer = document.getElementById('links-layer');

                Object.values(this.spaces).forEach(s => {
                    // Draw Links
                    s.links.forEach(lid => {
                        const l = this.spaces[lid];
                        if (lid > s.id) { // Prevent double-draw
                            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            line.setAttribute('x1', s.x); line.setAttribute('y1', s.y);
                            line.setAttribute('x2', l.x); line.setAttribute('y2', l.y);
                            line.setAttribute('stroke', '#444'); line.setAttribute('stroke-width', '4');
                            linksLayer.appendChild(line);
                        }
                    });

                    // Draw Node
                    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                    g.setAttribute('class', 'node');
                    g.onclick = () => this.handleNodeClick(s.id);

                    const base = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    base.setAttribute('cx', s.x); base.setAttribute('cy', s.y);
                    base.setAttribute('r', s.type === 'BIOME' ? '30' : (s.type === 'BASE' ? '60' : '15'));
                    base.setAttribute('fill', s.type === 'BASE' ? '#000' : '#1a1a1a');
                    base.setAttribute('stroke', s.color || '#333');
                    base.setAttribute('stroke-width', '4');
                    base.setAttribute('class', 'node-base');
                    g.appendChild(base);

                    if (s.type === 'BIOME') {
                        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        txt.setAttribute('x', s.x); txt.setAttribute('y', s.y + 45);
                        txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('font-size', '14');
                        txt.setAttribute('fill', s.color); txt.textContent = s.name.toUpperCase();
                        g.appendChild(txt);
                    }

                    spaceLayer.appendChild(g);
                });
            }

            renderPawns() {
                const layer = document.getElementById('pawns-layer');
                layer.innerHTML = '';

                // Group pawns to offset them if on same space
                const grouped = {};
                this.pawns.forEach(p => {
                    if (!grouped[p.spaceId]) grouped[p.spaceId] = [];
                    grouped[p.spaceId].push(p);
                });

                Object.entries(grouped).forEach(([sid, ps]) => {
                    const space = this.spaces[sid];
                    ps.forEach((p, i) => {
                        const offset = (i - (ps.length - 1) / 2) * 25;
                        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                        g.setAttribute('class', `pawn ${this.selectedPawn === p ? 'active-pawn' : ''}`);
                        g.setAttribute('transform', `translate(${space.x + offset}, ${space.y})`);
                        g.onclick = (e) => { e.stopPropagation(); this.handlePawnClick(p); };

                        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        c.setAttribute('r', '22'); c.setAttribute('fill', '#fff');
                        c.setAttribute('stroke', p.color); c.setAttribute('stroke-width', '2');
                        g.appendChild(c);

                        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        txt.setAttribute('y', 8); txt.setAttribute('text-anchor', 'middle');
                        txt.setAttribute('font-size', '20'); txt.textContent = p.icon;
                        g.appendChild(txt);

                        layer.appendChild(g);
                    });
                });
            }

            bindEvents() {
                document.getElementById('roll-btn').onclick = () => this.rollDice();
            }

            async rollDice() {
                if (this.state !== 'WAIT_ROLL') return;
                const visual = document.getElementById('dice-visual');
                visual.classList.add('rolling');
                
                // Real Rolling Effect
                for(let i=0; i<10; i++) {
                    visual.innerText = Math.floor(Math.random()*6)+1;
                    await new Promise(r => setTimeout(r, 80));
                }

                this.diceValue = Math.floor(Math.random() * 6) + 1;
                visual.classList.remove('rolling');
                visual.innerText = this.diceValue;
                
                this.state = 'SELECT_PAWN';
                this.log(`Você tirou ${this.diceValue}! Escolha seu pião para mover.`, this.turn.toLowerCase());
                this.renderPawns();
                document.getElementById('roll-btn').disabled = true;
            }

            handlePawnClick(pawn) {
                if (this.state !== 'SELECT_PAWN' || pawn.side !== this.turn) return;
                this.selectedPawn = pawn;
                this.calculatePossibleMoves();
                this.state = 'SELECT_DEST';
                this.renderPawns();
                this.highlightDests();
            }

            calculatePossibleMoves() {
                const start = this.selectedPawn.spaceId;
                const dist = this.diceValue;
                let results = new Set();

                // BFS for exactly X steps
                let queue = [{ id: start, d: 0 }];
                while(queue.length > 0) {
                    let { id, d } = queue.shift();
                    if (d === dist) {
                        results.add(id);
                        continue;
                    }
                    this.spaces[id].links.forEach(nextId => {
                        queue.push({ id: nextId, d: d + 1 });
                    });
                }
                this.possibleDests = Array.from(results).filter(id => id !== start);
            }

            highlightDests() {
                document.querySelectorAll('.node-highlight').forEach(el => el.remove());
                this.possibleDests.forEach(did => {
                    const space = this.spaces[did];
                    const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    ring.setAttribute('cx', space.x); ring.setAttribute('cy', space.y);
                    ring.setAttribute('r', space.type === 'BIOME' ? '40' : (space.type === 'BASE' ? '70' : '25'));
                    ring.setAttribute('fill', 'none'); ring.setAttribute('stroke', '#fff');
                    ring.setAttribute('class', 'node-highlight');
                    ring.style.pointerEvents = 'none';
                    document.getElementById('spaces-layer').appendChild(ring);
                });
            }

            handleNodeClick(id) {
                if (this.state !== 'SELECT_DEST' || !this.possibleDests.includes(id)) return;
                this.executeMove(id);
            }

            executeMove(targetId) {
                const pawn = this.selectedPawn;
                pawn.spaceId = targetId;

                // Check Capture
                const rivals = this.pawns.filter(p => p.spaceId === targetId && p.side !== pawn.side);
                if (rivals.length > 0) {
                    this.log(`O ${pawn.side === 'BIOMES' ? 'Guardião' : 'Invasor'} capturou uma peça rival!`, 'system');
                    this.pawns = this.pawns.filter(p => p !== rivals[0]);
                }

                this.endTurn();
            }

            endTurn() {
                this.turn = this.turn === 'BIOMES' ? 'INVADER' : 'BIOMES';
                this.state = 'WAIT_ROLL';
                this.selectedPawn = null;
                this.possibleDests = [];
                this.renderPawns();
                document.querySelectorAll('.node-highlight').forEach(el => el.remove());
                
                document.getElementById('roll-btn').disabled = false;
                document.getElementById('turn-txt').innerText = this.turn === 'BIOMES' ? 'TURNO DA NATUREZA' : 'TURNO DOS INVASORES';
                document.getElementById('turn-txt').style.color = this.turn === 'BIOMES' ? 'var(--accent-biome)' : 'var(--accent-invader)';
                
                this.updateScore();
                this.checkVictory();
            }

            updateScore() {
                const b = this.pawns.filter(p => p.side === 'BIOMES').length;
                const i = this.pawns.filter(p => p.side === 'INVADER').length;
                document.getElementById('score-text').innerHTML = `
                    <span style="color:var(--accent-biome)">VIVOS: ${b}</span> | <span style="color:var(--accent-invader)">INVASORES: ${i}</span>
                `;
            }

            checkVictory() {
                const b = this.pawns.filter(p => p.side === 'BIOMES').length;
                const i = this.pawns.filter(p => p.side === 'INVADER').length;
                if (i === 0) this.showVictory("VITÓRIA!", "A floresta repeliu a invasão!");
                else if (b === 0) this.showVictory("DERROTA!", "A devastação tomou conta dos biomas.");
            }

            showVictory(title, desc) {
                document.getElementById('victory-title').innerText = title;
                document.getElementById('victory-desc').innerText = desc;
                document.getElementById('victory-modal').style.display = 'flex';
            }

            log(msg, cls) {
                const log = document.getElementById('game-log');
                const div = document.createElement('div');
                div.className = `log-entry log-${cls}`;
                div.innerHTML = `> ${msg}`;
                log.prepend(div);
            }
        }

        const game = new GameEngine();
    </script>
</body>
</html>
